<script>
	function debounce(fun, delay) {
		var time;
		return function(args) {
			var that = this;
			var _args = args;
			if (time) clearTimeout(time);
			time = setTimeout(function() {
				fun.call(that, _args)
			}, delay)
		}
	};
</script>

<div id="dzzoffice">
	<el-container class="page-main">
		<!--{template common/container/pc/header_default}-->
		    <el-main>
				<div class="container">
					<div class="breadcrumb-wrapper" style="margin:15px 0">
						<el-breadcrumb separator-icon="ArrowRight">
							<el-breadcrumb-item><el-link href="{$_G['siteurl']}index.php?mod=manage">{lang manage_tool}</el-link></el-breadcrumb-item>

							</el-form-item>
							<el-form-item label="支持的文件后缀列表" >
								<el-radio-group v-model="FormData.status">
									<el-radio :label="0" border>关闭</el-radio>
									<el-radio :label="1" border>开启</el-radio>

							</el-form-item>
						</el-form>
						<div style="text-align: center;min-width: 100%;">
							<el-button type="primary" size="large">提交</el-button>
						</div>
					</div>
					
				</div>
			</el-main>
		  </el-container>
	</el-container>

</div>
<script>
	const { createApp, reactive, toRefs, toRef, ref, onMounted, nextTick, watch,defineAsyncComponent, onBeforeUpdate } = Vue;
	const dzzoffice = Vue.createApp({
		data(){
			return {
				DocumentThemeColor:'',
				FormData:{
					api:'',
					key:'',
					limit:0,
					ext:'',
					status:0
				}
			}
		},
		
		created(){
			//主题颜色
			let theme = localStorage.getItem('theme');
			if(theme){
				this.DocumentThemeColor=theme;
			}else{
				this.DocumentThemeColor = 'light'
			}
			
		},
		mixins:[],
		watch:{
			DocumentThemeColor:{
				handler(newval){
					document.querySelector('html').className = newval
				},
				deep:true,
				// immediate:true
			}
		},
		
		methods:{
			async handleSubmit(){
				let self = this;
				let {data: res} = await axios.post(MOD_URL+'&op=admin&do=submit',self.FormData);
				if(res.success){
					self.$message({
						type:'success',
						message:__lang.submit_success
					})
				}else{
					self.$message.error(res.msg || __lang.submit_error);
				}
			},
			DocumentThemeChange(){
				if(this.DocumentThemeColor=='light'){
					this.DocumentThemeColor='dark';
					localStorage.setItem('theme','dark');
				}else{
					this.DocumentThemeColor='light';
					localStorage.setItem('theme','light');
				}
				
			}
		},
		components: {
			
		},
		mounted(){

		}
	});
	dzzoffice.component('comavatar',comavatar);
	dzzoffice.component('international',international);
	dzzoffice.use(ElementPlus, {
		locale: {$_G['language_list'][$_G['language']]['elementflagCamel']},
	});
	for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
		dzzoffice.component(key, component)
	}
	// 屏蔽警告信息
	dzzoffice.config.warnHandler = function(){return null};
	dzzoffice.mount('#dzzoffice');
</script>
