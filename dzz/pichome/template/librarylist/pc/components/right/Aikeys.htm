<template v-if="RightData.Aikey.length>0 && RightData.Aikey[0]['type'] == 'files'">
    <div style="padding: 8px 18px;">
        <template v-if="RightData.Aikey.length>1">
            <el-dropdown placement="top-start" @command="handleAIBatch">
                <el-button plain style="width: 100%;">AI批量标注</el-button>
                <template #dropdown>
                    <el-dropdown-menu>
                        <el-dropdown-item v-for="aitem in RightData.Aikey" :command="aitem.key">{{aitem.name}}</el-dropdown-item>
                    </el-dropdown-menu>
                </template>
            </el-dropdown>

        </template>
        <template v-else>
            <el-button plain style="width: 100%;" @click="Aikeys.visible=true;Aikeys.key=RightData.Aikey[0].key">AI批量标注</el-button>
        </template>
	</div>
</template>
<template v-if="(RightData.Aikey.length>0 && RightData.Aikey[0]['type'] == 'folder') || (RightData.Aikey.length>0 && RightData.Aikey[0]['type'] == 'vapp')">
	<div style="padding: 8px 18px;">
        <template v-if="RightData.Aikey.length>1">
            <el-dropdown placement="top-start" @command="handleAIBatch">
                <el-button plain style="width: 100%;">AI批量标注整个文件夹图片</el-button>
                <template #dropdown>
                    <el-dropdown-menu>
                        <el-dropdown-item v-for="aitem in RightData.Aikey" :command="aitem.key">{{aitem.name}}</el-dropdown-item>
                    </el-dropdown-menu>
                </template>
            </el-dropdown>

        </template>
        <template v-else>
            <el-button plain style="width: 100%;" @click="Aikeys.visible=true;Aikeys.key=RightData.Aikey[0].key">AI批量标注整个文件夹图片</el-button>
        </template>

	</div>
</template>

<el-dialog
    v-model="Aikeys.visible"
    title="{lang ai_notes}"
    width="500"
    @open="AikeysOpen">
    <p class="tipTxt" v-if="RightData.Aikey.length>0 && RightData.Aikey[0].type == 'files'" style="margin: 0;margin-bottom: 12px;">
        {lang selected}
        <el-text type="warning" size="large" tag="b">{{RightActiveRid.length}}</el-text>
        {lang seleced_img_num}</p>
    <el-form 
        :model="AikeysForm[Aikeys.key]"
        style="max-width: 600px" 
        label-position="top">
        <template v-for="item in this.AikeysForm[Aikeys.key]">
            <el-form-item :label="item.title">
                <el-select v-model="item.value" placeholder="{lang empty_not_edit}" style="width: 100%">
                    <el-option
                        v-for="fitem in item.data"
                        :key="fitem.tplid"
                        :label="fitem.name"
                        :value="fitem.tplid"
                    />
                </el-select>
            </el-form-item>
        </template>
        
    </el-form>
    <template #footer>
        <div class="dialog-footer">
            <el-button @click="Aikeys.visible = false">{lang cancel}</el-button>
            <el-button type="primary" @click="AikeysSubmit">{lang submit}</el-button>
        </div>
    </template>
</el-dialog>
