<script type="text/javascript" src="dzz/pichome/template/librarylist/assets/js/common.js?{VERHASH}"></script>
<link rel="stylesheet" href="static/scss/default/index.css?{VERHASH}">
<script type="text/javascript" src="static/vue_components/screen/index.js?{VERHASH}"></script>
<script type="text/javascript" src="static/vue_components/screendir/index.js?{VERHASH}"></script>
<script type="text/javascript" src="static/vue_components/ImageLayout/index.js?{VERHASH}"></script>
<script type="text/javascript" src="static/vue_components/collectdialog/index.js?{VERHASH}"></script>
<script type="text/javascript" src="static/vue_components/HeaderSort/index.js?{VERHASH}"></script>
<link rel="stylesheet" type="text/css" href="static/scss/layout.css?{VERHASH}"/>
<link rel="stylesheet" type="text/css" href="{MOD_PATH}/template/library/default/view/mobile/assets/css/index.css?{VERHASH}"/>
<script type="text/javascript" src="static/jszip/jszip.min.js?{VERHASH}"></script>
<script type="text/javascript" src="static/jszip/FileSaver.min.js?{VERHASH}"></script>

<!--{template common/container/pc/header_end}-->
<div id="dzzoffice">
	<el-container>
		<el-header class="page-header"  height="60px" style="--el-header-padding: 0 8px;border: 0;">
            <!--{template intelligent/default/view/mobile/components/index/header}-->
        </el-header>
		<el-container>
			
		<el-main class="dzz-container" style="padding: 0px;overflow: hidden;position: relative;">
			<el-scrollbar 
				id="main_scrollbar" 
				class="main_scrollbar"
				ref="MainscrollbarRef" 
				@scroll="HandleElScrollbar">
				<el-affix 
					class="dzz-affix" 
					target=".main_scrollbar>.el-scrollbar__wrap" 
					:offset="rollingdire=='down'?-100:0" 
					style="padding: 0 10px;">
					<div 
					class="header-affix"
					:class="{notscreen:screenType.type}">
						<div style="display: flex;width: 100%;">
							<el-input 
								v-model="HeaderKeyword" 
								prefix-icon="Search" 
								@change="CommonGetImageData" 
								type="search" 
								placeholder="{lang search}" 
								clearable ></el-input>
							<el-popover
								placement="bottom"
								trigger="click"
								popper-class="isdropdown header-dropdown-menu"
								@show="handleDocumentOverlay(true)"
								@hide="handleDocumentOverlay(false)">
								<comsort
									:iscolumn="false"
									:defaultval="HeaderRightBtnShow"
									@change="HeaderShowChange">
								</comsort>
								<template #reference>
									<div style="margin-left: 12px;">
										<el-button icon="Sort"></el-button>
									</div>
								</template>
							</el-popover>
						</div>
						<el-header 
							v-if="!screenType.type && screenType.show"
							height="auto" 
							style="padding: 0px;width: 100%;">
							<dzz-screen
								ref="ScreenBoxRef"
								:resize="DocumentResize"
								:props="ScreenProps"
								:headerkeyword="HeaderKeyword"
								:defaultparam="ScreenParam"
								@submit="CommonGetImageData"
								@visible="handleDocumentOverlay"
								:hassub="hassub"
								@handlehassub="handlehassub">
							</dzz-screen>
						</el-header>
					</div>
				</el-affix>
				<div style="padding: 10px;">
					<div v-if="screenType.show && screenType.type" v-show="Screenshow" style="margin-bottom: 10px;">
						<div style="border-radius: 8px;background: var(--el-bg-color);border: var(--el-border);">
							<dzz-screendir
								ref="ScreenBoxRef"
								:resize="DocumentResize"
								:props="ScreenProps"
								:headerkeyword="HeaderKeyword"
								:defaultparam="ScreenParam"
								:appid="DocumentAppid"
								:defauldata="ScreenData"
								:ispc="false"
								@submit="CommonGetImageData"
								:hassub="hassub">
							</dzz-screendir>
						</div>
						
					</div>
					
					<!--{template intelligent/default/view/mobile/components/index/image}-->
				</div>
				<div class="right-toolbar">
					<el-backtop target=".main_scrollbar>.el-scrollbar__wrap" style="position: unset;margin-top: 10px;"></el-backtop>
				</div>
			</el-scrollbar>
			<div v-if="DocumentOverlay.main" class="el-overlay dzz-overlay" style="z-index: 1001;background: transparent;"></div>
		</el-main>

		</el-container>


		<el-footer class="page-header" id="footer_header"  height="60px" style="padding: 0px 10px;border: 0;border-top:1px solid var(--el-border-color);" v-if="DataPageset.topNavigation">
			<!--{template intelligent/default/view/mobile/components/index/footer}-->
		</el-footer>
	</el-container>
    <!--{template intelligent/default/view/mobile/components/index/screen/Jsindex}-->
	<!--{template intelligent/default/view/mobile/components/index/common}-->
	<!--分享对话框加载-->
	<!--{eval  include template('shareAddDialog_m','./dzz/shares/template/')}-->
</div>
<script>
	const { createApp, reactive, toRefs, toRef, ref, onMounted, nextTick, watch, computed, onBeforeUpdate , onUnmounted } = Vue;
	var dzzoffice = createApp({
		data(){
			return {
				pdata:$json_data,
				DocumentResize:0,
				DocumentAppid:'$data['pval']',
				DocumentCtrl:false,
				DocumentDropActive:false,
				DocumentDropActive1:false,
				OpenDetailType:'new',
				DocumentThemeColor:'',//dark
				scrollref:null,
				DocumentVapp:{appname:'',type:0},
				ispc:true,
				classifyType:parseInt('{$data['pageset']['classifyType']}'),
				screenType:{
					type:0,
					show:false
				},
				DocumentOverlay:{
					left:false,
					screen:false,
					main:false,
				},
				HeaderRightBtnShow:{
					display:[],//显示内容
					other:'btime',//显示内容其它
					order:'btime',//排序方式
					sort:'desc',//升序、降序
					column:['left','right'],//侧边栏
					layout:'waterFall'//图片布局方式
				},
				DataPageset:$json_pageset
			}
		},
		watch:{
			DocumentThemeColor:{
				handler(newval){
					document.querySelector('html').className = newval
				},
				deep:true,
				// immediate:true
			},

		},
		created(){
			this.handleIsPc();
			let theme = localStorage.getItem('theme');
			if(theme){
				this.DocumentThemeColor=theme;
			}else{
				this.DocumentThemeColor = 'light'
			}

			this.getBannerData();

			if(this.ispc && this.classifyType){
				this.ScreenProps.isclassify = false;
			}else{
				this.ScreenProps.isclassify = true;
			}
			let keyword = this.CommonGetHashParam('keyword');
			if(keyword){
				this.HeaderKeyword = decodeURI(keyword);
			}
			let aid = this.CommonGetHashParam('aid');
			if(aid){
				let cropImg = sessionStorage.getItem('cropimg'+this.DocumentAppid);
				this.searchdata.aid = parseFloat(aid);
				this.searchdata.img = cropImg;
			}
			this.ScreenParam.appid = this.DocumentAppid;
			let ShowScreen = sessionStorage.getItem('showscreen')? sessionStorage.getItem('showscreen'):1;
			if(parseInt(ShowScreen)){
				this.Screenshow = true;
			}else{
				this.Screenshow = false;
			}
			this.CommonInit();
		},
		mixins:[CommonMixin,HeaderMixin,FooterMixin,ScreenMixin,MixinImage,ShareAddDialogMixin],
		methods:{

			DocumentThemeChange(){
				if(this.DocumentThemeColor=='light'){
					this.DocumentThemeColor='dark';
					localStorage.setItem('theme','dark');
				}else{
					this.DocumentThemeColor='light';
					localStorage.setItem('theme','light');
				}
				
			},
			handleIsPc(){
                let innerWidth = window.innerWidth;
                if(innerWidth > 768){
                    this.ispc = true;
                }else{
                    this.ispc = false;
                }
            },
			handlehassub(status){
				this.hassub = parseInt(status);
			},
			handleDocumentOverlay(status,type){
				for (const key in this.DocumentOverlay) {
					this.DocumentOverlay[key] = status;
				}
				if(this.DocumentOverlay[type]){
					this.DocumentOverlay[type] = false;
				}
			},
			
		},
		mounted(){
			var self = this;
			dzzoffice.WindowThis = this;
			
			this.scrollref = self.$refs.MainscrollbarRef;
			window.onresize = function(){
				self.DocumentResize += 1;
			};
			
		},
		components:{
			comavatar,
			comsort,
			menuitem
		}
	});
	dzzoffice.use(ElementPlus, {
		<!--{if $_G['language']=='zh-CN'}-->
		locale: {$_G['language_list'][$_G['language']]['elementflagCamel']},
		<!--{/if}-->
	});
	for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
		dzzoffice.component(key, component)
	}
	dzzoffice.component('international',international);
	dzzoffice.use(ImageLayout);
	dzzoffice.use(DzzScreen);
	dzzoffice.use(DzzScreendir);
	dzzoffice.use(DzzCollectdialog);
	// 屏蔽警告信息
	dzzoffice.config.warnHandler = function(){return null};
	dzzoffice.mount('#dzzoffice');
</script>
<!--{template common/container/pc/footer}-->
