<!--{template common/container/pc/header_start}-->
<link rel="stylesheet" href="static/scss/default/index.css?{VERHASH}">
<link rel="stylesheet" type="text/css" href="{MOD_PATH}/template/main/assets/css/index.css?{VERHASH}"/>
<!--{template common/container/pc/header_end}-->
<div id="dzzoffice">
    <el-container class="page-main">
        <el-header style="padding: 0;">
            <!--{template main/components/header}-->
        </el-header>
        <el-container>
            <el-aside width="200px">
                <!--{template main/components/left}-->
            </el-aside>
            <el-main style="padding: 0;">
                <el-scrollbar ref="refscrollbar" style="padding: 20px;">
                    <div style="width: 100%;overflow: hidden;">
                         <!--{template main/components/basic}-->
                        <div style="display: flex;justify-content:space-between; padding-top: 20px;">
                            <div v-if="parseInt(LeftActive) == 6" style="text-align: left;">
                                <el-button size="large" icon="CirclePlus" type="primary" @click="addCollection(0)">{lang create_collect}</el-button>
                                <el-button size="large" icon="CirclePlus" type="info" @click="addCollection(1)">{lang create_inteligent_collect}</el-button>
                            </div>
                            <div  style="text-align: left;">
                                <el-dropdown v-if="checks.length>0"   @command="handleBatchCommand">
                                    <el-button type="primary" class="el-dropdown-link">
                                        {lang batch_operation}
                                      <el-icon class="el-icon--right">
                                        <arrow-down />
                                      </el-icon>
                                    </el-button>
                                    <template #dropdown>
                                        <el-dropdown-menu>
                                            <template v-if="parseInt(LeftActive) == 7">
                                                <el-dropdown-item command="batchDelete">{lang delete_final}</el-dropdown-item>
                                                <el-dropdown-item command="Restore">{lang restore}</el-dropdown-item>
                                            </template>
                                            <template v-else>
                                                <el-dropdown-item command="batchDelete">{lang batch_delete}</el-dropdown-item>
                                                <el-dropdown-item v-if="parseInt(LeftActive) != 6 " command="Collect">
                                                    {lang to_collect}</el-dropdown-item>
                                                <el-dropdown-item  command="enableStatus">{lang enable}</el-dropdown-item>
                                                <el-dropdown-item  command="disableStatus">{lang close}</el-dropdown-item>
                                            </template>
                                        </el-dropdown-menu>
                                    </template>
                                </el-dropdown>
                            </div>
                            <el-pagination v-if="pageData.count>pageData.pagesize"
                                large
                                background
                                layout="sizes,prev, pager, next, total"
                                :page-size="pageData.pagesize"
                                :page-sizes="pageData.pagesizes"
                                :total="pageData.count"
                                :current-page="pageData.page"
                                @current-change="handlePageChange"
                                @size-change="handleSizeChange"

                            ></el-pagination>
                        </div>
                    </div>
                </el-scrollbar>
            </el-main>
        </el-container>
        
    </el-container>
    <el-dialog
            v-model="batchCollectDialog.visible"
            title="{lang to_select_collect}"
            width="500"
            align-center
            @open="batchCollectDialogOpen"
    >
    <div style="padding-bottom:20px">
        <el-text tag="p" style="margin-bottom: 20px;" type="info" >已选中{{batchCollectDialog.ids.length}}{lang gfile}</el-text>
        <el-select
                v-model="batchCollectDialog.rpids"
                multiple
                filterable
                placeholder="{lang please_select_collect}"
                style="width: 100%"
        >
            <el-option
                    v-for="item in batchCollectDialog.collects"
                    :key="item.id"
                    :label="item.name"
                    :value="item.id"
            />
        </el-select>
        </div>
        <template #footer>
            <div class="dialog-footer">
                <el-button @click="batchCollectDialog.visible = false">{lang cancel}</el-button>
                <el-button type="primary" @click="batchCollet">
                    {lang save}
                </el-button>
            </div>
        </template>
    </el-dialog>
</div>
<script type="text/javascript">
    const { createApp, reactive, toRefs, toRef, ref, onMounted, nextTick, watch , onUnmounted } = Vue;
    const dzzoffice = createApp({
        data() {
            return {
                DocumentThemeColor:'',
                keyword:'',
                active:0,
                tableData:[],
                checks:[],
                pageData:{
                    pagesizes:[10,20,30,50,100],
                    pagesize:20,
                    count:0,
                    page:1
                },
                batchCollectDialog:{
                    visible:false,
                    ids:[],
                    rpids:[],
                    collects:[],

                }
            }
        },
        mixins:[LightMixin],
        watch:{
            DocumentThemeColor:{
                handler(newval){
                    document.querySelector('html').className = newval
                },
                deep:true,
                // immediate:true
            }
        },
        created() {
            //主题颜色
            let theme = localStorage.getItem('theme');
            if(theme){
                this.DocumentThemeColor=theme;
            }else{
                this.DocumentThemeColor = 'light'
            }
            let ptype=this.GetUrlParam('ptype');
            if(ptype) {
                this.LeftActive=parseInt(ptype);

            }
            let page=this.GetUrlParam('page');
            if(page) {
                this.pagedata.page = parseInt(page);
            }
            let keyword=this.GetUrlParam('keyword');
            if(keyword) {
                this.keyword = keyword;
            }

            this.GetData();
        },
        methods: {
            async handleBatchCommand(command){
                let self=this;
                switch (command) {
                    case 'batchDelete':
                        if(parseInt(self.LeftActive) == 7) {//彻底删除
                            self.$messageBox.confirm(
                                '{lang delete_final_tip}',
                                '{lang board_message}',
                                {
                                    confirmButtonText: '{lang confirms}',
                                    cancelButtonText: '{lang cancel}',
                                    type: 'warning',
                                    icon:'QuestionFilled'
                                }
                            ).then(async () => {
                                let {data: res } = await axios.post('{MOD_URL}&op=admin&operation=del',{
                                    ids:this.checks,
                                });
                                if(res.code == 1 && res.data.length>0){
                                    res.data.forEach(data=>{
                                        self.tableData.splice(self.tableData.findIndex(item=>item.id == data),1);
                                    });
                                    self.$message.success('{lang do_success}');

                                }else{
                                    self.$message.error('{lang do_failed}');
                                }
                            }).catch(() => {

                            })


                        }else{//放入回收站
                            let {data: res} = await axios.post('{MOD_URL}&op=admin&operation=changstatus', {
                                ids: this.checks,
                                status: 2
                            });
                            if (res.code == 1) {
                                this.checks.forEach(data=>{
                                    self.tableData.splice(self.tableData.findIndex(item=>item.id == data),1);
                                });
                                 self.$message.success('{lang do_success}')

                            } else {
                                self.$message.error('{lang do_failed}')
                            }
                        }
                        break;
                    case 'Collect':
                        self.batchCollectDialog.ids=this.checks;
                        self.batchCollectDialog.visible=true;
                        break
                    case 'Restore':
                        let {data: res2 } = await axios.post('{MOD_URL}&op=admin&operation=changstatus',{
                            ids:this.checks,
                            status:0
                        });
                        if(res2.code == 1){
                            this.checks.forEach(data=>{
                                self.tableData.splice(self.tableData.findIndex(item=>item.id == data),1);
                            });
                            self.$message.success('{lang do_success}')
                        }else{
                            self.$message.error('{lang do_failed}')
                        }
                        break;
                    case 'enableStatus':
                        let {data: res } = await axios.post('{MOD_URL}&op=admin&operation=changstatus',{
                            ids:this.checks,
                            status:1
                        });
                        if(res.code == 1){
                            this.checks.forEach(data=>{
                                self.tableData[self.tableData.findIndex(item=>item.id == data)].pstatus=1;
                            });
                            self.$message.success('{lang do_success}')
                        }else{
                            self.$message.error( '{lang do_failed}')
                        }
                        break;
                    case 'disableStatus':
                        let {data: res1 } = await axios.post('{MOD_URL}&op=admin&operation=changstatus',{
                            ids:this.checks,
                            status:0
                        });
                        if(res1.code == 1){
                            this.checks.forEach(data=>{
                                self.tableData[self.tableData.findIndex(item=>item.id == data)].pstatus=0;
                            });
                            self.$message.success('{lang do_success}')
                        }else{
                            self.$message.error('{lang do_failed}')
                        }
                        break;
                }
                return false;
            },
            handleEditCollect(id){
                this.batchCollectDialog.ids=[id];
                this.batchCollectDialog.visible=true;
            },
            async batchCollet(){
                let self=this;
                // if(this.batchCollectDialog.rpids.length<1){
                //     self.$message.error('{lang please_select_collect}');
                //     return false;
                // }
                let {data: res} = await axios.post(MOD_URL+'&op=admin&operation=batchCollect',{
                    pids:this.batchCollectDialog.ids,
                    rpids:this.batchCollectDialog.rpids
                });
                if(res.success) {
                    self.$message.success('{lang do_success}');
                    this.batchCollectDialog.visible=false;
                    this.GetData();
                }else{
                    self.$message.error('{lang do_failed}');
                }
            },
            async batchCollectDialogOpen(){
                if(this.batchCollectDialog.collects.length<1){
                    let {data: res} = await axios.post(MOD_URL+'&op=admin&operation=getCollectList',{
                        q:''
                    });
                    if(res.success) {
                        this.batchCollectDialog.collects=res.data;
                    }
                }
                let {data: res} = await axios.post(MOD_URL+'&op=admin&operation=getCollectOptions',{
                    pids:this.batchCollectDialog.ids,
                });
                if(res.success) {
                    this.batchCollectDialog.rpids=res.data;
                }else{
                    this.batchCollectDialog.visible=false;
                }
            },
            handleSizeChange( val){
                this.pageData.pagesize = val;
                this.GetData();
            },
            selectable(row){
                let self=this;
                if(row.ptype=='6' && parseInt(self.LeftActive) != 7){
                    return false;
                }else{
                    return true;
                }
            },
            handleSelectionChange(rows){
                let self=this;
                let arr = [];
                rows.forEach((row) => {
                    arr.push(row.id);
                });
                self.checks = [...new Set(arr)];
            },
            toggleSelection(rows, ignoreSelectable) {
                let self=this;
                if (rows) {
                    rows.forEach((row) => {
                        if(self.checks.includes(row.id)){
                            self.checks.splice(self.checks.indexOf(row.id),1);
                        }else{
                            self.checks.push(row.id);
                        }
                    });
                } else {
                    this.checks=[];
                }
            },
            //获取哈希参数
            GetUrlParam(name,url){
                if(!url){
                    var hash=location.hash;
                    var url=hash.replace(/&.+$/i,'').replace('#','');
                }else{
                    var url=location.hash;
                }
                if (!name) {
                    return '';
                }
                var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
                if (!url) {
                    return '';
                }
                var r = url.match(reg);
                if (r !== null) {
                    return decodeURIComponent(r[2]);
                }
            },
            addCollection(flag){
                if(flag>0){
                    location.href = MOD_URL + '&op=choose&ptype=6&flag='+flag;
                }else {
                    location.href = MOD_URL + '&op=choose&ptype=6';
                }
            },
            //获取二维码
			async TableGeturlqrcode(id){
				const self = this;
                let curr = this.tableData.find((current) => {
                    return parseFloat(current.id) == parseFloat(id);
                });
                if(curr && curr.isqrcode){
                    return false;
                }
				let {data: res} = await axios.post(MOD_URL+'&op=ajax&do=geturlqrcode',{
					pid:id
				});
				if(res.success){
                    curr.isqrcode = true;
                    curr.qrcodeurl = res.qrcode;
				}else{
					self.$message.error(res.msg || '{lang Get_QR_error}');
				}

			},
            async handleStatus(data){
                let self = this;

                let {data: res } = await axios.post('{MOD_URL}&op=admin&operation=changstatus',{
                    ids:[data.id],
                    status:parseInt(self.LeftActive) == 7?0:1
                });
                if(res.code == 1){
                    if(parseInt(self.LeftActive) == 7){
                        self.tableData.splice(self.tableData.findIndex(item=>item.id == data.id),1);
                    }
                    self.$message.success('{lang do_success}')
                }else{
                    self.$message.error('{lang do_failed}')
                }
            },
            handleSearchClear(){
                this.pageData.page = 1;
                this.keyword='';
                this.GetData();
            },
            handleSearch(){
                this.pageData.page = 1;
                this.GetData();
            },
            handlePageChange(page){
                let self = this;
                this.pageData.page=page;
              //  self.$nextTick(()=>{
                    self.$refs.refscrollbar.scrollTo({top:0});
           //     });
                this.GetData();

            },
            handleedit(id){
                window.location.href = '{MOD_URL}&op=mould&id='+id;
            },
            async handleDelete(id){
                let self = this;
                let {data: res } = await axios.post('{MOD_URL}&op=admin&operation=del',{
                    ids:[id]
                });
                if(res.code == 1){

                    let index = self.tableData.findIndex(item => parseInt(item.id) == parseInt(id));
                    self.tableData.splice(index,1);
                }else{
                    self.$message.error('{lang do_failed}')
                }
            },
            async GetData(){
                let self = this;
                let param = {
                    page:this.pageData.page,
                    perpage:this.pageData.pagesize,
                    ptype:this.LeftActive,
                    keyword:this.keyword
                }
                let {data: res } = await axios.post('{MOD_URL}&op=admin&operation=list',param);
                this.tableData = res.data.data;
                this.pageData.count = parseInt(res.data.total);
                this.checks=[];

            },
            DocumentThemeChange(){
                if(this.DocumentThemeColor=='light'){
                    this.DocumentThemeColor='dark';
                    localStorage.setItem('theme','dark');
                }else{
                    this.DocumentThemeColor='light';
                    localStorage.setItem('theme','light');
                }
                let self=this;
            },
            CopyUrl(url){
				const self = this;
				var input = document.createElement('input'); input.setAttribute('id', 'copyInput');
				input.setAttribute('value', '{$_G['siteurl']}'+url);
				document.getElementsByTagName('body')[0].appendChild(input);
				document.getElementById('copyInput').select();
				document.execCommand('copy')
				self.$message({
					message: '{lang copy_clipboard}',
					type: 'success'
				});
				document.getElementById('copyInput').remove();
			},
        },
        mounted() {
            dzzoffice.WindowThis = this;
  
        }
    });
    dzzoffice.use(ElementPlus, {
        locale: {$_G['language_list'][$_G['language']]['elementflagCamel']},
    });
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
        dzzoffice.component(key, component)
    }
    dzzoffice.component('comavatar', comavatar);
    dzzoffice.component('international',international);
    // 屏蔽警告信息
    dzzoffice.config.warnHandler = function(){return null};
    dzzoffice.mount('#dzzoffice');
</script>

<!--{template common/container/pc/footer}-->
