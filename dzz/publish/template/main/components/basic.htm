
<el-table ref="multipleTableRef" row-key="id" :data="tableData"  @selection-change="handleSelectionChange" style="width: 100%">
    <el-table-column type="selection" :selectable="selectable"  width="40"></el-table-column>
    <el-table-column prop="type" label="{lang publish_ptype}" width="60px" align="center">
        <template #default="scope">
            <template v-if="parseInt(scope.row.ptype) == 0">
                <!-- 全部 -->
                <el-icon style="font-size: 20px;">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6H8C6.89543 6 6 6.89543 6 8V18C6 19.1046 6.89543 20 8 20H18C19.1046 20 20 19.1046 20 18V8C20 6.89543 19.1046 6 18 6Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M18 28H8C6.89543 28 6 28.8954 6 30V40C6 41.1046 6.89543 42 8 42H18C19.1046 42 20 41.1046 20 40V30C20 28.8954 19.1046 28 18 28Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M40 6H30C28.8954 6 28 6.89543 28 8V18C28 19.1046 28.8954 20 30 20H40C41.1046 20 42 19.1046 42 18V8C42 6.89543 41.1046 6 40 6Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M40 28H30C28.8954 28 28 28.8954 28 30V40C28 41.1046 28.8954 42 30 42H40C41.1046 42 42 41.1046 42 40V30C42 28.8954 41.1046 28 40 28Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg>
                </el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 1">
                <!-- 单文件 -->
                <el-icon style="font-size: 20px;"><Document /></el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 2">
                <!-- 多文件 -->
                <el-icon style="font-size: 20px;">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="13" y="10" width="28" height="34" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M35 10V4H8C7.44772 4 7 4.44772 7 5V38H13" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 22H33" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 30H33" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 3">
                <!-- 库发布 -->
                <el-icon style="font-size: 20px;">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.59202 19.4667C4.29018 18.2091 5.24343 17 6.53679 17H41.4632C42.7566 17 43.7098 18.2091 43.408 19.4667L38.368 40.4667C38.1522 41.366 37.348 42 36.4232 42H11.5768C10.652 42 9.84784 41.366 9.63202 40.4667L4.59202 19.4667Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><rect x="11" y="7" width="8" height="10" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 17L25.5 8L38 17" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 25H23" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
                </el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 5">
                <!-- 智能数据 -->
                <el-icon style="font-size: 20px;">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M24.0002 45C27.2208 45 32.7276 40.8 32.7276 24C32.7276 7.2 27.2208 3 24.0002 3C20.7797 3 15.2729 7.48302 15.2729 24C15.2729 40.517 20.7797 45 24.0002 45Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path fill-rule="evenodd" clip-rule="evenodd" d="M5.10515 35.0001C6.71545 37.8124 13.2479 40.4211 28.364 31.6211C43.48 22.8211 44.5057 15.8124 42.8954 13.0001C41.2851 10.1878 34.4981 7.72728 19.6367 16.3791C4.77521 25.0308 3.49489 32.1878 5.10515 35.0001Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path fill-rule="evenodd" clip-rule="evenodd" d="M5.10506 13.0001C3.4948 15.8124 4.52046 22.8211 19.6366 31.6211C34.7527 40.4211 41.285 37.8124 42.8953 35.0001C44.5056 32.1878 43.2253 25.0308 28.3638 16.3791C13.5024 7.72728 6.71537 10.1878 5.10506 13.0001Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 4">
                <!-- 单页 -->
                <el-icon style="font-size: 20px;">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M39 4H11C9.89543 4 9 4.89543 9 6V42C9 43.1046 9.89543 44 11 44H39C40.1046 44 41 43.1046 41 42V6C41 4.89543 40.1046 4 39 4Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 30L31 30" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 36H24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><rect x="17" y="12" width="14" height="10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 6">
                <!-- 合集 -->

                <el-icon style="font-size: 20px;color:var(--el-color-primary)" title="{lang collect_intelligent}" v-if="scope.row.flag">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 7V19H7C5.89543 19 5 19.8954 5 21V41C5 42.1046 5.89543 43 7 43H27C28.1046 43 29 42.1046 29 41V29H41C42.1046 29 43 28.1046 43 27V7C43 5.89543 42.1046 5 41 5H21C19.8954 5 19 5.89543 19 7Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </el-icon>
                <el-icon style="font-size: 20px;"  title="{lang collect_manual}" v-else>
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 7V19H7C5.89543 19 5 19.8954 5 21V41C5 42.1046 5.89543 43 7 43H27C28.1046 43 29 42.1046 29 41V29H41C42.1046 29 43 28.1046 43 27V7C43 5.89543 42.1046 5 41 5H21C19.8954 5 19 5.89543 19 7Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </el-icon>
            </template>
            <template v-else-if="parseInt(scope.row.ptype) == 7">
                <!-- 删除 -->
                <el-icon style="font-size: 20px;">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 12L16.2 5H31.8L33 12" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M6 12H42" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path fill-rule="evenodd" clip-rule="evenodd" d="M37 12L35 43H13L11 12H37Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 35H29" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
                </el-icon>
            </template>
        </template>
    </el-table-column>
    <el-table-column prop="pname" label="{lang publish_name}" show-overflow-tooltip>
        <template #default="scope">
        <el-link :href="scope.row.url" target="_preview">{{scope.row.pname}}</el-link>
        </template>
    </el-table-column>
    <el-table-column prop="tname" label="{lang pubish_template_name}" width="150px"></el-table-column>
    <el-table-column v-if="parseInt(LeftActive) != 6" prop="tname" label="{lang collect_of}" show-overflow-tooltip width="250px">
        <template #default="scope">
         <el-text style="padding:0 3px;" v-for="rpdata in scope.row.rpdatas">{{rpdata.pname}}</el-text>
        </template>
    </el-table-column>
    <!--<el-table-column prop="cview" label="查看次数" width="80px"></el-table-column>

    <el-table-column prop="cdownload" label="下载次数" width="80px"></el-table-column>-->
    <el-table-column prop="updatedate" label="{lang update_time}" width="200px"></el-table-column>

    <el-table-column  prop="pstatus"  :label="parseInt(LeftActive) !== 7?'{lang status}':'{lang restore}'"  width="100">
        <template #default="scope">
            <el-switch 
            v-model="scope.row.pstatus"
            :active-value="1"
            :inactive-value="0"
            @change="handleStatus(scope.row)"></el-switch>                             
        </template>
    </el-table-column>

    <el-table-column prop="" label="{lang operation}" width="255">
        <template #default="scope">
            <el-button title="{lang to_collect}" v-if="parseInt(LeftActive)!=6" type="primary" size="small" plain  @click="handleEditCollect(scope.row.id)"> <el-icon>
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 7V19H7C5.89543 19 5 19.8954 5 21V41C5 42.1046 5.89543 43 7 43H27C28.1046 43 29 42.1046 29 41V29H41C42.1046 29 43 28.1046 43 27V7C43 5.89543 42.1046 5 41 5H21C19.8954 5 19 5.89543 19 7Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </el-icon></el-button>
            <el-popover
                placement="top"
                popper-class="qrcode-box"
                :width="144"
                @before-enter="TableGeturlqrcode(scope.row.id)"
                trigger="hover">
                <div class="box" v-loading="!scope.row.isqrcode">
                    <el-image draggable="false" v-if="scope.row.qrcodeurl" :src="scope.row.qrcodeurl" fit="contain">
                        <template #error><div class="el-image__placeholder"></div></template>
                    </el-image>
                    <el-text tag="p" style="text-align: center;padding-top: 12px;">{lang QR}</el-text>
                    <div v-if="scope.row.qrcodeurl" class="download" @click="TableDownQrcodeurl(scope.row.qrcodeurl)">
                        <div style="text-align: center;">
                            <el-icon style="font-size: 22px;"><Download /></el-icon>
                            <el-text tag="p" style="width: 100%;">{lang Download_QR}</el-text>
                        </div>
                    </div>
                </div>
                <template #reference>
                    <el-button type="info" plain  size="small">
                        <el-icon>
                            <svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"><path d="M112 195.84A83.84 83.84 0 0 1 195.84 112h202.992a83.84 83.84 0 0 1 83.84 83.84v202.992a83.84 83.84 0 0 1-83.84 83.84H195.84A83.84 83.84 0 0 1 112 398.832V195.84zM195.84 176A19.84 19.84 0 0 0 176 195.84v202.992c0 10.96 8.88 19.84 19.84 19.84h202.992a19.84 19.84 0 0 0 19.84-19.84V195.84A19.84 19.84 0 0 0 398.832 176H195.84z m345.488 19.84A83.84 83.84 0 0 1 625.168 112H828.16A83.84 83.84 0 0 1 912 195.84v202.992a83.84 83.84 0 0 1-83.84 83.84H625.184a83.84 83.84 0 0 1-83.84-83.84V195.84z m83.84-19.84a19.84 19.84 0 0 0-19.84 19.84v202.992c0 10.96 8.88 19.84 19.84 19.84H828.16A19.84 19.84 0 0 0 848 398.832V195.84A19.84 19.84 0 0 0 828.16 176H625.184zM112 625.168a83.84 83.84 0 0 1 83.84-83.84h202.992a83.84 83.84 0 0 1 83.84 83.84V828.16A83.84 83.84 0 0 1 398.832 912H195.84A83.84 83.84 0 0 1 112 828.16V625.184z m83.84-19.84a19.84 19.84 0 0 0-19.84 19.84V828.16c0 10.944 8.88 19.824 19.84 19.824h202.992a19.84 19.84 0 0 0 19.84-19.84V625.184a19.84 19.84 0 0 0-19.84-19.84H195.84z m345.488-32a32 32 0 0 1 32-32h88.16a32 32 0 0 1 32 32v86.832h49.088v-86.832a32 32 0 0 1 32-32h95.84a32 32 0 0 1 0 64h-63.84v86.832a32 32 0 0 1-32 32h-113.072a32 32 0 0 1-32-32v-86.832h-24.16v92.592a32 32 0 1 1-64 0v-124.592z m329.088 54.256a32 32 0 0 1 32 32v53.184a32 32 0 0 1-64 0v-53.184a32 32 0 0 1 32-32z m-240.912 150.832a32 32 0 0 1 32-32h134.16a32 32 0 0 1 0 64h-102.16v29.92H838.4v-21.184a32 32 0 0 1 64 0v53.184a32 32 0 0 1-32 32H661.504a32 32 0 0 1-32-32v-93.92z m-56.16-12.832a32 32 0 0 1 32 32v74.752a32 32 0 1 1-64 0v-74.752a32 32 0 0 1 32-32z"></path></svg>
                        </el-icon>
                    </el-button>
                </template>
            </el-popover>
            <el-button title="{lang copy}" type="info" size="small" plain icon="CopyDocument" @click="CopyUrl(scope.row.address)" style="margin-left: 12px;"></el-button>
            <el-button title="{lang edit}" type="success" size="small" plain icon="EditPen" @click="handleedit(scope.row.id)"></el-button>
            <el-popconfirm :title="parseInt(LeftActive) < 7 ? '{lang delete_to_recycle_confirm_tip}':'{lang delete_final_tip}'" @confirm="handleDelete(scope.row.id)">
                <template #reference>
                    <el-button title="{lang delete}" type="danger" size="small" plain icon="Delete"></el-button>
                </template>
            </el-popconfirm>
            
        </template>
    </el-table-column>
</el-table>
