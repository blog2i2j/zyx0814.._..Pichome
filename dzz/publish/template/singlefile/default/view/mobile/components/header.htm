<a href="{$data['url']}" class="h-left" style="justify-content: start;padding-right: 6rem;overflow: hidden;">
	<el-text tag="b" size="large" truncated style="color:var(--el-text-color-primary);">{$data['pname']}</el-text>
</a>
<div class="h-right" style="min-width: 52px;"> 
    <el-icon class="icon" style="font-size: 20px;" @click="rightdrawer=true"><Warning /></el-icon>
    <comavatar
        :level="parseInt($_G['pichomelevel'])"
        iscollect="<!--{if defined('PICHOME_LIENCE') && (!$_G['config']['pichomeclosecollect'] || $_G['adminid'])}--><!--{/if}-->"
        :adminid="parseInt($_G['adminid'])"
        PICHOME_LIENCE="<!--{if defined('PICHOME_LIENCE')}--><!--{/if}-->"
        :uid="parseInt($_G['uid'])"
        upgrade="<!--{if $_G['setting']['upgrade']}--><!--{/if}-->"
        version="$_G['setting']['version']"
        formhash="{FORMHASH}">
        <el-avatar size="40">
            {eval echo avatar_block($_G['uid']);}
        </el-avatar>
    </comavatar>
    
</div>
<script>
    const HeaderMixins = {
        data(){
            return {

            }
        },
        created(){

        },
        methods:{

            handleNavigationSelect(data){
                let self = this;
                if(parseInt(data.btype) == 3){
                    if(data.realurl){
                        window.open(data.realurl)
                    }else if(data.url){
                        window.open(data.url)
                    }else{
                        self.$message.error('{lang no_link_address}');
                    }
                    return false;
                }else if(parseInt(data.btype) == 5){
                    return;
                }

                if(data.url){
                    window.location.href = data.url;
                }else{
                    window.location.href = data.realurl;

                }

            },
            DocumentThemeChange(){
                if(this.DocumentThemeColor=='light'){
                    this.DocumentThemeColor='dark';
                    localStorage.setItem('theme','dark');
                }else{
                    this.DocumentThemeColor='light';
                    localStorage.setItem('theme','light');
                }
            }

        }
    }
</script>
