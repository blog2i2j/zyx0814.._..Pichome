<el-drawer 
	v-model="rightdrawer" 
	direction="rtl" 
	size="100%" 
	append-to-body 
	:lock-scroll="false" 
	title="{lang deafil_info}"
	class="rightdrawer">
    <template #default>
		<div class="name">
			{{imagesData.name}}.{{imagesData.ext}}
		</div>
		<div class="block" v-if="imagesData.colors && imagesData.colors.length">
			<div class="title">{lang color}</div>
			<div class="block-item colors">
				<div class="colors" v-for="item in imagesData.colors">
					<div :style="{background: '#'+item}"></div>
				</div>
			</div>
		</div>
		<div class="block" v-if="imagesData.tag && imagesData.tag.length">
			<div class="title">{lang label}</div>
			<div class="block-item tag">
				<div class="tag" v-for="item in imagesData.tag">{{item}}</div>
			</div>
		</div>
		<div class="block" v-if="imagesData.link">
			<div class="title">{lang link}</div>
			<div class="block-item link">
				<span>{{imagesData.link}}</span>
				<el-icon @click="rightcopyText(imagesData.link)"><Copy-Document /></el-icon>
			</div>
		</div>
		<div class="block" v-if="imagesData.realfianllypath">
			<div class="title">{lang fix_address}</div>
			<div class="block-item link">
				<span>{{imagesData.realfianllypath}}</span>
				<el-icon @click="rightcopyText(imagesData.realfianllypath)"><Copy-Document /></el-icon>
			</div>
		</div>
		<div class="block" v-if="imagesData.foldernames && imagesData.foldernames.length">
			<div class="title">{lang classify}</div>
			<div class="block-item tag">
				<div class="tag" v-for="item in imagesData.foldernames">{{item.fname}}</div>
			</div>
		</div>
		<div class="information block">
			<el-text v-cloak truncated tag="b" class="tip" style="color: var(--el-text-color-primary);margin-bottom: 0.625rem;" size="large">
				{lang basic_message}</el-text>
			<div class="block-item">
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang grade}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<div class="record" v-cloak>
							<div class="el-rate el-rate--small">
								<span class="el-rate__item" v-for="s in parseFloat(imagesData.grade)" style="cursor: default;">
									<el-icon class="el-rate__icon is-active"><Star-Filled></Star-Filled></el-icon>
								</span>
								<span class="el-rate__item" v-for="s in 5 - parseFloat(imagesData.grade)" style="cursor: default;">
									<el-icon class="el-rate__icon"><Star></Star></el-icon>
								</span>
							</div>
						</div>
					</el-col>
				</el-row>
	
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang size}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<el-text size="small" style="color: var(--el-text-color-primary);">{{imagesData.width}}×{{imagesData.height}}</el-text>
					</el-col>
				</el-row>
	
	
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang filesize}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<el-text size="small" style="color: var(--el-text-color-primary);">{{imagesData.fsize}}</el-text>
					</el-col>
				</el-row>
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang type}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<el-text size="small" style="color: var(--el-text-color-primary);">{{imagesData.ext}}</el-text>
					</el-col>
				</el-row>
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang creation_time}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<el-text size="small" style="color: var(--el-text-color-primary);">{{imagesData.mtime}}</el-text>
					</el-col>
				</el-row>
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang add_time}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<el-text size="small" style="color: var(--el-text-color-primary);">{{imagesData.btime}}</el-text>
					</el-col>
				</el-row>
				<el-row class="basic" type="flex" class="field">
					<el-col :span="12">
						<el-text v-cloak truncated size="small">{lang modify_time}</el-text>
					</el-col>
					<el-col :span="12" style="text-align: right;">
						<el-text size="small" style="color: var(--el-text-color-primary);">{{imagesData.dateline}}</el-text>
					</el-col>
				</el-row>
			</div>
			
		</div>
    </template>
</el-drawer>

<script type="text/javascript">
	var RightMixin = {
		data() {
			return {
				rightdrawer:false,
				ColorPopver: {},
				ImageCollect: {
					visible: false,
					rid: ''
				}
			}
		},
		methods:{
			rightcopyText(val) {
				CopyTxt(this, val);
			},
			rightShowPopoverColor(val) {
				var rgb = this.righthexToRgb('#' + val);
				var hsl = this.rightrgbToHsl(rgb.r, rgb.g, rgb.b);
				var cmyk = this.rightRgbToCmyk(rgb.r, rgb.g, rgb.b);
				var hsv = this.rightrgbToHsv(rgb.r, rgb.g, rgb.b);
				this.ColorPopver = {
					base: '#' + val,
					rgb: 'rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')',
					rgba: 'rgba(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ', 1)',
					hsl: hsl,
					hsv: hsv,
					cmyk: cmyk
				};
			},
			rightCommandColor(val){
				if(val == 'common'){
					window.location.href = MOD_URL + '#appid=' + this.imagesData.appid + '&color=' + this.ColorPopver.base;
				}else{
					CopyTxt(this,val)
				}
			},
			rightView(){
				if(this.imagesData.realfianllypath){
					window.open(this.imagesData.realfianllypath);
				}else if(this.imagesData.iniframe){
					window.open(this.imagesData.iniframe);
				}else if(this.imagesData.originalimg){
					window.open(this.imagesData.originalimg);
				}else{
					window.open(this.imagesData.icondata);
				}
			},
			async rightShare() {
				var self = this;
				self.shareDialog.title=self.imagesData.name;
				self.shareDialog.visible=true;
				self.shareDialog.filepaths=[self.imagesData.rid];
				self.shareDialog.stype=0;
				self.shareDialog.sperm=self.imagesData.perm;
			},
			async rightDown() {
				let self = this;
				if(this.previews.data && this.previews.data.length && this.previews.active > 0){
					if(self.isadmin){
						window.open('index.php?mod=pichome&op=download&dpath=' + this.previews.data[this.previews.active].dpath);
					}else{
						window.open('index.php?mod=banner&op=download&dpath=' + this.previews.data[this.previews.active].dpath);
					}
				}else{
					if (self.imagesData.dpath) {
						if(self.isadmin){
							window.open('index.php?mod=pichome&op=download&dpath=' + self.imagesData.dpath);
						}else{
							window.open('index.php?mod=banner&op=download&dpath=' + self.imagesData.dpath);
						}
					} else {
						self.$message({
							message: '{lang data_error}',
							type: 'error'
						});
					}
				}
			},

			rightClickLink(val){
				window.open(val);
				// window.location.href = MOD_URL + '#appid=' + this.imagesData.appid + '&link=1&linkval=' + val;
			},
			righthexToRgb(hex) {
				var str = {
					r: parseInt('0x' + hex.slice(1, 3)),
					g: parseInt('0x' + hex.slice(3, 5)),
					b: parseInt('0x' + hex.slice(5, 7))
				};
				return str;
			},
			rightrgbToHsl(r, g, b) {
				r /= 255, g /= 255, b /= 255;
				var max = Math.max(r, g, b),
					min = Math.min(r, g, b);
				var h, s, l = (max + min) / 2;
				if (max == min) {
					h = s = 0; // achromatic
				} else {
					var d = max - min;
					s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
					switch (max) {
						case r:
							h = (g - b) / d + (g < b ? 6 : 0);
							break;
						case g:
							h = (b - r) / d + 2;
							break;
						case b:
							h = (r - g) / d + 4;
							break;
					}
					h *= 6;
				}
				return 'hsl(' + Math.round(parseInt(h * 100) / 10) + ', ' + Math.round(parseInt(s * 1000) / 10) +
					'%, ' + Math.round(parseInt(l * 1000) / 10) + '%)';
			},
			rightrgbToHsv(R, G, B) {
				R /= 255
				G /= 255
				B /= 255
				var max = Math.max(R, G, B)
				var min = Math.min(R, G, B)
				var range = max - min
				var V = max
				var S = V === 0 ? 0 : range / V
				var H = 0
				if (R === V) H = (60 * (G - B)) / range
				if (G === V) H = 120 + (60 * (B - R)) / range
				if (B === V) H = 240 + (60 * (R - G)) / range
				if (range === 0) H = 0
				if (H < 0) H += 360
				return 'hsv(' + Math.round(H) + ', ' + Math.round(parseInt(S * 1000) / 10) + '%, ' + Math.round(
					parseInt(V * 1000) / 10) + '%)';
			},
			rightRgbToCmyk(R, G, B) {
				if ((R == 0) && (G == 0) && (B == 0)) {
					return [0, 0, 0, 1];
				} else {
					var calcR = 1 - (R / 255),
						calcG = 1 - (G / 255),
						calcB = 1 - (B / 255);
			
					var K = Math.min(calcR, Math.min(calcG, calcB)),
						C = (calcR - K) / (1 - K),
						M = (calcG - K) / (1 - K),
						Y = (calcB - K) / (1 - K);
			
					return 'cmyk(' + Math.round(parseInt(C * 1000) / 10) + '%, ' + Math.round(parseInt(M * 1000) /
						10) + '%, ' + Math.round(parseInt(Y * 1000) / 10) + '%, ' + Math.round(parseInt(K *
						1000) / 10) + '%)';
				}
			},
		},
	};
</script>
