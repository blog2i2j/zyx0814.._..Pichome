<!--{template common/robot/header_simple_start_none}-->
<style>


    .editor-content {
        margin-bottom: 20px;
    }

    .file-content {
        margin-bottom: 20px;
    }

    img {
        max-width: 100%;
        max-height:100%;
    }
    .mb20{
        margin-bottom: 20px;
    }

    .file-list{
        padding:20px 0;
    }
    .file-list .file-item{
        margin-bottom: 10px;
        position: relative;
        display: flex;

    }
    .file-list .file-item .file-item-thumb{
       text-align: center;
       width:150px;
       max-height:200px;
        min-width:150px;
        background-color: #FBFBFB;
        border:1px solid #e1e1e1;
        border-radius: 5px;
    }
    .file-list .file-item .file-item-info{
        padding: 10px 20px;
    }
    .file-list .file-item .file-item-info div{
        margin-bottom: 10px;
    }
</style>
<!--{template common/robot/header_simple_end_none}-->
<!--{template common/robot/commer_header_none}-->
<div class="container" style="padding:20px">
    <!--{if $data['pageset']['_file_background']}-->
    <div class="banner mb20">
        <img src="$data['pageset']['_file_background'][0]['src']">
    </div>
    <!--{/if}-->
    <!--{if $data['pageset']['title']}-->
    <div class="title mb20">
        $data['pageset']['title']
    </div>
    <!--{/if}-->
    <!--{if $data['pageset']['subtitle']}-->
    <div class="subtitle mb20">
        $data['pageset']['subtitle']
    </div>
    <!--{/if}-->

    <div class="file-list">
       <!--{loop $cdata $file}-->
        <div class="file-item">
            <div class="file-item-thumb">
                <a href="$file['url']" target="_blank">
                    <img src="{$file['img']}">
                </a>
            </div>
            <div class="file-item-info">
                <div class="file-item-title" ><a href="$file['url']" target="_blank">$file['pname']</a></div>
                <!--{if $file['metadescription']}-->
                <div class="file-item-desc" title="{lang description}">$file['metadescription']</div>
                <!--{/if}-->
                <div class="file-item-time" title="{lang create_time}">$file['dateline']</div>

            </div>
        </div>
        <!--{/loop}-->
    </div>
    <!--{if $multi}-->
    <div class="page-wrapper">
        $multi
    </div>
    <!--{/if}-->
</div>
<!--{template common/robot/footer_none}-->
