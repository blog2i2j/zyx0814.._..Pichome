<el-aside class="left-aside" width="260px">
    <el-page-header @back="RightgoBack">
        <template #icon>
            <el-icon style="color: var(--el-text-color-primary);font-size: 24px;"><Back /></el-icon>
        </template>
        <template #title>
            <el-text tag="b" size="large" truncated style="color: var(--el-text-color-primary)">{lang goback}</el-text>
        </template>
        <template #content>
            <div style="display: flex;align-items: center;">
                <el-text tag="b" size="large" truncated style="color: var(--el-text-color-primary);vertical-align: bottom;">{{rightTitle}}</el-text>
                <el-icon style="margin-left: 12px;cursor: pointer;" @click="RightEditTitle"><Edit-Pen /></el-icon>
            </div>
        </template>
    </el-page-header>
    <el-scrollbar style="padding: 10px;">
        <el-text style="margin-bottom: 10px;display: block;color: var(--el-text-color-primary);" tag="b">{lang select_template}</el-text>
        <ul class="right-type-box">
            <li 
            draggable="true" 
            v-for="item in rightData" 
            class="right-type-li"
            :class="{'right-type-li-disabled':rightdb_idsStatus && item.flag == 'db_ids'}">
                <el-text><el-icon><Circle-Plus /></el-icon>{{item.name}}</el-text>
            </li>
        </ul>
    </el-scrollbar>
</el-aside>
<script>
    const RightMixin = {
        data(){
            return {
                rightTitle:'',
                rightData:[
                    {name:'{lang slide_show}',flag:'slide'},
                    {name:'{lang image_mix}',flag:'image_mix'},
                    {name:'{lang full_text}',flag:'rich_text'},
                    {name:'{lang link}',flag:'link'},
                    {name:'{lang banner_ads}',flag:'banner'},
                    // {name:'联系方式',flag:'contact'},
                    {name:'{lang faqs}',flag:'question'},
                    {name:'{lang manual_recommend}',flag:'manual_rec'},
                    {name:'{lang file_recommend}',flag:'file_rec'},
                    // {name:'图组推荐',flag:'picture_rec'},
                    // {name:'矩行推荐',flag:'rectangle_rec'},
                    {name:'{lang library_show}',flag:'db_ids'},
                    {name:'{lang file_search}',flag:'search_rec'},
                    {name:'{lang publish_search}',flag:'search_pub'},
                    {name:'{lang publish_recommend}',flag:'collect_rec'},
                    {name:'{lang publish_collect_show}',flag:'collect_ids'},
                    <!--{if defined('LICENSE_VERSION') && LICENSE_VERSION == 'Enterprise'}-->
                    {name:'{lang tab_recommend}',flag:'tab_rec'},
                    <!--{/if}-->
                ],
                rightdb_idsStatus:false
            }
        },
        methods:{
            RightEditTitle(){
                let self = this;
                ElementPlus.ElMessageBox.prompt('', __lang.title, {
                    confirmButtonText: __lang.confirms,
                    inputPlaceholder: __lang.please_input,
                    inputValue:self.rightTitle,
                    cancelButtonText: __lang.close,
                    inputValidator: (value) => {       // 点击按钮时，对文本框里面的值进行验证
                        if(!value) {
                            return __lang.conetnt_not_null;
                        }
                    },
                    inputErrorMessage: __lang.conetnt_not_null,
                }).then(async ({ value }) => {
                    const {data: res} = await axios.post(BasicUrl+'pageRename',{
                        id:$id,
                        newname:value
                    });
                    if(res.success){
                        self.rightTitle = value;
                    }else{
                        self.$message.error(res.msg || __lang.edit_error)
                    }
                }).catch(() => {

                })
            },
            RightgoBack(){
                window.location.href = 'index.php?mod=alonepage';
            },
            rightSortable(){
                const self = this;
                var tbody = document.querySelector('.right-type-box');
                new Sortable(tbody, {
                    draggable: ".right-type-li",
                    filter: ".right-type-li-disabled",
                    group: {
                        name: 'shared',
                        pull:'clone'
                    },
                    sort: false,
                    animation: 150,
                    // 元素被选中
                    onChoose: function (/**Event*/evt) {
                        self.mainvisible = false;
                    },
                    // 元素未被选中的时候（从选中到未选中）
                    onUnchoose: function (/**Event*/evt) {
                        self.mainvisible = true;
                    },
                });
            }
        },
        mounted(){
            this.rightSortable();
        }
    }
</script>
