<script type="text/javascript">
	var MixinImage = {
		data(){
			return {
				ImageDataIsExpanded:0,
				ImageProps:{
					layout:'rowGrid',//rowGrid,imageList,waterFall
					ShowMessage:{
						display:[],
                    	other:null
					},
					urlparam:{},
					operation:{
						click:false,//节点是否可被选择
	                    dblclick:true,//节点是否可被双击选择
	                    ctrl:false,//是否开启ctrl选中
	                    shift:false,//是否开启shift选中
	                    contextmenu:false,//是否开启右键
	                    drap:false,//是否开启拖动选中
						checked:false
					}
				},
				ImageParam:{
					checkedKdys:[]
				},
				ImageCollect:{//收藏
					show:false,
					name:'',
					visible:false,
					rid:[],
					quick:false,
					type:'add',
					url:''
				},
				ImageDataParam:{},
				ImageDataIframe:null,
			}
		},

		methods:{
			ImageCollectSuccess(data){
				let self = this;
				this.ImageCollect.visible = false;
				if(data.cid == this.LeftActiveid)return false;
				this.ImageCollect.name = data.catname;
				this.ImageCollect.quick = true;
				if(this.ImageCollect.type == 'move' && this.LeftActiveid != 'all'){
					self.$refs.RefImageLayout.DeleteData(this.ImageCollect.rid);
				}
				this.LeftTree.show = false;
				self.$nextTick(function(){
					self.LeftTree.show = true;
				});
			},
			ImageCollectClose(){
				this.ImageCollect.visible = false;
			},
			ImageQuickChangeCollect(lid){
				this.ImageCollect.url = 'index.php?mod=collection&op=collect&do=collectfiletocollect';
				this.ImageCollect.type = 'add';
				this.ImageCollect.rid = [lid];
				this.ImageCollect.visible = true;
			},
            ImageOperationVal(type,val){
				return {
					type:type,
					val:val
				};
			},
            async ImageOperation(command){
                let self=this;
				let type = command.type;
				let val = command.val;

				if(type == 'share'){
					// var res = await axios.post(MOD_URL+'&op=collect&do=addshare',{lid:val});
					// var json = res.data;
					// if(json.success){
					// 	CopyTxt(self, json.success);
					// }else{
					// 	self.$message({
					// 	  message: '分享失败',
					// 	  type: 'error'
					// 	});
					// }
                    console.log(val);
                    self.shareDialog.visible=true;
                    self.shareDialog.title=val.name;
                    self.shareDialog.sid=0;
                    self.shareDialog.filepaths=[val['lid']];
                    self.shareDialog.stype=1;


				}else if(type == 'down'){
					window.open(SITEURL+MOD_URL+'&op=download&dpath='+val);
				}else if(type == 'move'){
					this.ImageCollect.url = 'index.php?mod=collection&op=collect&do=movefiletocollect';
					this.ImageCollect.type = 'move';
					this.ImageCollect.rid = [val];
					this.ImageCollect.visible = true;
				}else if(type == 'delcollect'){
					self.$confirm('{lang Confirm_cancle_collectfile}', '{lang cancle_collectfile}', {
						confirmButtonText: '{lang confirms}',
						cancelButtonText: '{lang cancel}',
						type: 'warning',
						closeOnClickModal:false,
						showClose:false
					}).then(async function() {
						var res = await axios.post(MOD_URL+'&op=collect&do=canclecollect',{
							clid:self.Leftclid,
							cid:self.LeftActiveid!='all'&&self.LeftActiveid!='not'?self.LeftActiveid:'',
							lids:val
						});
						var json = res.data;
						if(json.success){
							self.$refs.RefImageLayout.DeleteData([val]);
							self.LeftTree.show = false;
							self.$nextTick(function(){
								self.LeftTree.show = true;
							});
							
							self.$message({
								type:'success',
								message:'{lang cancel_success}'
							});
						}else{
							self.$message.error(json.error);
						}
					}).catch(function() {
						// this.$message({
						// 	type: 'info',
						// 	message: '已取消删除'
						// });          
					});
				}else if(type == 'cove'){
					var res = await axios.post(MOD_URL+'&op=collect&do=setcovert',{
						clid:self.Leftclid,
						lid:val
					});
					var json = res.data;
					if(json.success){
						self.$message({
							message: '{lang set_cover_success}',
							type: 'success'
						});
					}else{
						self.$message({
							message: json.error,
							type: 'error'
						});
					}
				}
			},
			Imagereturnparam(data){//列表加载完成返回得参数
				this.ImageDataParam = data;
				var arr = [];
				for(var i in this.ImageDataParam.data){
					arr.push(this.ImageDataParam.data[i].dpath)
				}
				if(this.ImageDataIframe){
					var params = this.CommonSetParam();
					params['ispage'] = this.ImageDataParam.ismore;
					params['page'] = this.ImageDataParam.page;
					params['total'] = this.ImageDataParam.total;
					params['totalpage'] = this.ImageDataParam.totalpage;
					params['perpage'] = this.ImageDataParam.perpage;
					params['pagetab'] = 'pichome';
					params['moreurl'] = MOD_URL+'&op=library&do=filelist&operation=filelist';
					this.ImageDataIframe.sessionStorage.setItem('imgparam',JSON.stringify(params));
					
					this.ImageDataIframe.sessionStorage.setItem('imgs',arr.join(','));
				}else{
					sessionStorage.setItem('imgs',arr.join(','));
				}
				
			},
			ImagePageTurning(dpath){//详情翻页事件
				const self = this;
				self.$refs.RefImageLayout.SetScrollbarTop(dpath);
				self.HandleElScrollbar();
			},
			HandleElScrollbar(){
				var self = this;
				self.$refs.RefImageLayout.HandleElScrollbar();
			},
			ImageDetails(item){//双击事件
				const self = this;
				var arr = [];
				for(var i in this.ImageDataParam.data){
					arr.push(this.ImageDataParam.data[i].dpath)
				}
				let index = this.ImageDataParam.data.findIndex(function(current){
					return current.dpath == item.dpath;
				});
				
				if(this.OpenDetailType == 'new'){
					var params = this.CommonSetParam();
					params['ispage'] = this.ImageDataParam.ismore;
					params['page'] = this.ImageDataParam.page;
					params['total'] = this.ImageDataParam.total;
					params['totalpage'] = this.ImageDataParam.totalpage;
					params['perpage'] = this.ImageDataParam.perpage;
					params['pagetab'] = 'pichome';
					params['moreurl'] = MOD_URL+'&op=library&do=filelist&operation=filelist';
					this.ImageDataIframe = window.open('index.php?mod=details#path='+item.dpath,'details');
					this.ImageDataIframe.sessionStorage.setItem('imgparam',JSON.stringify(params));
					this.ImageDataIframe.sessionStorage.setItem('imgs',arr.join(','));
					this.ImageDataIframe.sessionStorage.setItem('selectindex',index);
					this.ImageDataIframe.sessionStorage.setItem('href',window.location.href);
				}else{
					sessionStorage.setItem('href',window.location.href);
					sessionStorage.setItem('selectindex',index);
					this.DetailsIframe = 'index.php?mod=details&opentype=current#path='+item.dpath;

				}
				window.removeEventListener('message', this.ImageDetailsMessage)
				window.addEventListener('message', this.ImageDetailsMessage)
			},
			ImageDetailsMessage(event){
		      	if (event.origin !== window.location.origin) {
		        	return;
		      	}
		      	this.ImagePageTurning(event.data.dpath);
			},
		},
		mounted(){
			var self = this;
		}
	};
</script>
