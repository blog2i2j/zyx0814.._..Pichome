<div class="h-left" style="justify-content: start;width: 240px;padding-right: 20px;">
    <template v-if="!Leftshareid && (parseInt(DocumentPerm) && (!parseInt($_G['config']['pichomeclosecollect']) || parseInt(DocumentAdminId)))">
        <a class="el-page-header__left" href="index.php?mod=collection&op=view" style="margin-right: 6px;color: var(--el-text-color-primary);">
            <el-icon style="font-size: 21px;font-weight: 700;"><Back /></el-icon>
        </a>
        <span class="text" >
            <span v-cloak>{{DocumentName}}</span>
        </span>
        <!--{if intval($perm)>1}-->
        <el-dropdown trigger="click" placement="bottom" @command="HeaderLeftOperation" v-if="parseInt(DocumentPerm)>1">
            <div class="l-operation">
                <el-icon size="large"><Setting /></el-icon>
            </div>
            <template #dropdown>
                <el-dropdown-menu>
                    <el-dropdown-item icon="EditPen" command="edit">{lang edit_collect_name}</el-dropdown-item>
                    <el-dropdown-item icon="CirclePlus" command="add">{lang add_category}</el-dropdown-item>
                    <el-dropdown-item v-if="parseInt(DocumentPerm)>2" icon="Delete" command="delete">{lang delete_collects}</el-dropdown-item>
                    <el-dropdown-item icon="Share" divided command="share">{lang share_collect}</el-dropdown-item>
                </el-dropdown-menu>
            </template>
            
        </el-dropdown>
        <!--{/if}-->
    </template>
    <template v-else>
		<el-image class="logo" src="dzz/collection/image/logo.png?{VERHASH}" fit="contain" style="height: 60%;"></el-image>
		<el-text tag="b" size="large" style="color:var(--el-text-color-primary)">{{DocumentName}}</el-text>
    </template>
</div>
<div class="h-center" style="padding-left: 0px;">
	<el-input
		v-if="LeftActiveid!='user'"
		style="max-width: 300px;"
		v-model="HeaderKeyword"
		@input="HeaderKeywordInput"
		@keydown.enter="HeaderKeywordInput"
		clearable
		prefix-icon="Search"
	></el-input>
</div>
<div class="h-right"> 
    <!--{template pc/components/all/rightBtn}-->
    <comavatar
        :level="parseInt($_G['pichomelevel'])"
        iscollect="<!--{if defined('PICHOME_LIENCE') && (!$_G['config']['pichomeclosecollect'] || $_G['adminid'])}--><!--{/if}-->"
        :adminid="parseInt($_G['adminid'])"
        PICHOME_LIENCE="<!--{if defined('PICHOME_LIENCE')}--><!--{/if}-->"
        :uid="parseInt($_G['uid'])"
        upgrade="<!--{if $_G['setting']['upgrade']}--><!--{/if}-->"
        version="$_G['setting']['version']"
        formhash="{FORMHASH}">
        <el-avatar size="40">
            {eval echo avatar_block($_G['uid']);}
        </el-avatar>
    </comavatar>
    
</div>
<el-dialog
	title="{lang rename}"
	v-model="editHeaderTitle.visible"
	:close-on-press-escape="false"
	:show-close="false"
	:close-on-click-modal="false"
	@submit.native.prevent="editHeaderTitleSubmit">
	<el-form ref="FormLeftRef" :model="editHeaderTitle">
		<el-form-item 
		label="{lang name}："
		prop="title"
		:rules="[
		  { required: true, message: '{lang Please_input_name}', trigger: 'blur' }
		]">
		
			<div class="language-box">
				<el-input v-model.trim="editHeaderTitle.title"></el-input>
				<language 
				v-if="editHeaderTitle.langkey && editHeaderTitle.langkey.name" 
				:langkey="editHeaderTitle.langkey.name" 
				@change="editHeaderTitleChange"></language>
			</div>
			
		</el-form-item>
	</el-form>
    <template #footer>
        <span class="dialog-footer">
            <el-button @click="editHeaderTitle.visible = false" :disabled="editHeaderTitle.loading">{lang cancel}</el-button>
            <el-button type="primary" @click="editHeaderTitleSubmit" :loading="editHeaderTitle.loading">{lang confirms}</el-button>
        </span>
    </template>
	
</el-dialog>
<script>
    const HeaderMixin = {
        data(){
            return {
                HeaderKeyword:'',
                keywordpopper:false,
                editHeaderTitle:{
                    title:'',
					langkey:'',
                    visible:false,
                    loading:false
                }
            }
        },
        watch:{

        },
        mixins:[HeaderRightBtnMixin],
        methods:{
			editHeaderTitleChange(value){
				this.editHeaderTitle.title = value;
				this.DocumentName = value;
			},
            HeaderKeywordInput:debounce(function(val){
				this.CommonGetImageData();
			},500),
            async editHeaderTitleSubmit(){
				var self = this;
				if(!self.editHeaderTitle.title){
					self.$message.error('{lang Please_input_name}')
					return false;
				}
				self.editHeaderTitle.loading = true;

                url = MOD_URL+'&op=collect&do=addcollect';
				var res = await axios.post(MOD_URL+'&op=collect&do=addcollect',{
                    clid:self.Leftclid,
                    name:self.editHeaderTitle.title
                });

				var json = res.data;
                self.editHeaderTitle.loading = false;
				if(json.success){
					var data = json.success;
                    self.DocumentName = self.editHeaderTitle.title;
					
					self.$message({
                        type:'success',
                        message:'{lang edit_success}'
                    });
					self.editHeaderTitle.visible = false;
				}else{
					self.$message.error(json.error || '{lang modification_error}');
				}
			},
            async HeaderLeftOperation(type){
				var self = this;
				switch(type){
                    case 'edit':
                        this.editHeaderTitle.title = this.DocumentName;
						this.editHeaderTitle.visible = true;
					break;
					case 'add':
                        this.LeftTreeOperation('addparent')
					break;
					case 'delete':
						self.$confirm('{lang delete_collect_confirm}', '{lang delete}', {
							confirmButtonText: '{lang confirms}',
							cancelButtonText: '{lang cancel}',
							type: 'warning',
							closeOnClickModal:false,
							showClose:false
						}).then(async function() {
							self.DocumentLoading = true;
							
							self.LoginFunc = self.HeaderLeftOperation;
							self.LoginParam = type;
							var res = await axios.post(MOD_URL+'&op=collect&do=delcollect',{clid:self.Leftclid});
							if(res == 'intercept'){
								return false;
							}
							var json = res.data;
							if(json.success){
								window.location.href = MOD_URL;
							}else{
								self.DocumentLoading = false;
								self.$message.error(json.error);
							}
						}).catch(function() {
							// this.$message({
							// 	type: 'info',
							// 	message: '已取消删除'
							// });          
						});
					break;
					case 'share':

						var self = this;


						self.LoginFunc = self.HeaderLeftOperation;
						self.LoginParam = type;

                        self.shareDialog.visible=true;
                        self.shareDialog.title=this.DocumentName;
                        self.shareDialog.filepaths=[self.Leftclid];
                        self.shareDialog.stype=2;

						// var res = await axios.post(MOD_URL+'&op=collect&do=addshare',{clid:self.Leftclid});
						// if(res == 'intercept'){
						// 	return false;
						// }
						// var json = res.data;
						// if(json.success){
						// 	CopyTxt(self, json.success);
						// }else{
						// 	self.$message({
						// 	  message: '分享失败',
						// 	  type: 'error'
						// 	});
						// }

					break;
				}
			},
        },
        mounted(){
            const self = this;
        }
    }
</script>
