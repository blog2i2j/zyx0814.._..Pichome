<Image-Layout 
	ref="RefImageLayout"
	:layout="ImageProps.layout"
	:props="ImageProps.operation"
	:showmessage="ImageProps.ShowMessage"
	url="index.php?mod=collection&op=filelist&operation=filelist"
	:urlparam="ImageProps.urlparam"
	@dblclick="ImageDetails"
	@returnparam="Imagereturnparam"
	:scrollref="scrollref"
	:screenshow="Screenshow"
	nodekey="lid"
	:ischecked="false">
    <template v-slot:operation="{ data }">
		<template  v-if="ImageProps.layout=='rowGrid' || ImageProps.layout=='imageList' || ImageProps.layout=='waterFall'">
			<div class="operation-box">
				<el-dropdown @command="ImageOperation">
					<span class="operation-btn">
						<el-icon><More-Filled /></el-icon>
					</span>
					<template #dropdown>
						<el-dropdown-menu>
							<el-dropdown-item 
								v-if="parseInt(data.share)" 
								:command="ImageOperationVal('share',data.lid)">
								<el-icon><Share /></el-icon>
								{lang share}
							</el-dropdown-item>
							<el-dropdown-item v-if="parseInt(data.download)" 
								:command="ImageOperationVal('down',data.dpath)" 
								class="circulars">
								<el-icon><Download /></el-icon>
								{lang download}
							</el-dropdown-item>
							
							<el-dropdown-item 
								v-if="DocumentType=='details' && parseInt(DocumentPerm)>1" 
								:command="ImageOperationVal('move',data.lid)" 
								class="circulars">
								<el-icon><Rank /></el-icon>
								{lang move}
							</el-dropdown-item>
							<el-dropdown-item 
								v-if="DocumentType=='details' && parseInt(DocumentPerm)>1" 
								:command="ImageOperationVal('cove',data.lid)" 
								class="circulars">
								<el-icon><Picture /></el-icon>
								{lang set_cover}
							</el-dropdown-item>
							<el-dropdown-item 
								v-if="parseInt(DocumentPerm)>1" 
								:command="ImageOperationVal('delcollect',data.lid)" 
								class="circulars">
								<el-icon><Star /></el-icon>
								{lang cancle_collectfile}
							</el-dropdown-item>
						</el-dropdown-menu>
					</template>
				</el-dropdown>
			</div>
		</template>
		<template v-else>
			<el-dropdown @command="ImageOperation">
				<el-button :plain="active" style="margin-left: 12px;" icon="MoreFilled"></el-button>
				<template #dropdown>
					<el-dropdown-menu>
						<el-dropdown-item 
							v-if="parseInt(data.share)" 
							:command="ImageOperationVal('share',data.lid)">
							<el-icon><Share /></el-icon>
							{lang share}
						</el-dropdown-item>
						<el-dropdown-item v-if="parseInt(data.download)" 
							:command="ImageOperationVal('down',data.dpath)" 
							class="circulars">
							<el-icon><Download /></el-icon>
							{lang download}
						</el-dropdown-item>
						
						<el-dropdown-item 
							v-if="DocumentType=='details' && parseInt(DocumentPerm)>1" 
							:command="ImageOperationVal('move',data.lid)" 
							class="circulars">
							<el-icon><Rank /></el-icon>
							{lang move}
						</el-dropdown-item>
						<el-dropdown-item 
							v-if="DocumentType=='details' && parseInt(DocumentPerm)>1" 
							:command="ImageOperationVal('cove',data.lid)" 
							class="circulars">
							<el-icon><Picture /></el-icon>
							{lang set_cover}
						</el-dropdown-item>
						<el-dropdown-item 
							v-if="parseInt(DocumentPerm)>1" 
							:command="ImageOperationVal('delcollect',data.lid)" 
							class="circulars">
							<el-icon><Star /></el-icon>
							{lang cancle_collectfile}
						</el-dropdown-item>
					</el-dropdown-menu>
				</template>
			</el-dropdown>
		</template>
        
    </template>
</Image-Layout>
<script type="text/javascript">
	var MixinImage = {
		data(){
			return {
				ImageDataIsExpanded:0,
				ImageProps:{
					layout:'rowGrid',//rowGrid,imageList,waterFall
					ShowMessage:{
						display:[],
                    	other:null
					},
					urlparam:{},
					operation:{
						click:false,//节点是否可被选择
	                    dblclick:true,//节点是否可被双击选择
	                    ctrl:false,//是否开启ctrl选中
	                    shift:false,//是否开启shift选中
	                    contextmenu:false,//是否开启右键
	                    drap:false,//是否开启拖动选中
						checked:false
					}
				},
				ImageParam:{
					checkedKdys:[]
				},
				ImageDataParam:{},
				ImageDataIframe:null,
				
			}
		},

		methods:{
            ImageOperationVal(type,val){
				return {
					type:type,
					val:val
				};
			},
            async ImageOperation(command){
				var type = command.type;
				var val = command.val;
				var self = this;
				if(type == 'share'){
					var res = await axios.post(MOD_URL+'&op=collect&do=addshare',{lid:val});
					var json = res.data;
					if(json.success){
						CopyTxt(self, json.success);
					}else{
						self.$message({
						  message: '{lang share_failer}',
						  type: 'error'
						});
					}
				}else if(type == 'down'){
					window.open(SITEURL+MOD_URL+'&op=download&dpath='+val);
				}else if(type == 'move'){
					this.ImageCollect.type = 'move';
					this.ImageCollect.lids = [val];
					this.ImageCollect.dialogVisible = true;
				}else if(type == 'delcollect'){
					self.$confirm('{lang Confirm_cancle_collectfile}', '{lang cancle_collectfile}', {
						confirmButtonText: '{lang confirms}',
						cancelButtonText: '{lang cancel}',
						type: 'warning',
						closeOnClickModal:false,
						showClose:false
					}).then(async function() {
						var res = await axios.post(MOD_URL+'&op=collect&do=canclecollect',{
							clid:self.Leftclid,
							cid:self.LeftActiveid!='all'&&self.LeftActiveid!='not'?self.LeftActiveid:'',
							lids:val
						});
						var json = res.data;
						if(json.success){
							var ImageDataList = JSON.parse(JSON.stringify(self.ImageDataList));
							for(var index=ImageDataList.length-1;index>=0;index--){
								if(parseInt(ImageDataList[index].lid) == parseInt(val)){
									ImageDataList.splice(index,1);
								}
							}
							self.ImageParams.scroll = false;
							self.ImageDataList = ImageDataList;
							if(self.DocumentType == 'details'){
								self.LeftTree.show = false;
								self.$nextTick(function(){
									self.LeftTree.show = true;
								});
							}
							
							self.$message({
								type:'success',
								message:'{lang cancel_success}'
							});
						}else{
							self.$message.error(json.error);
						}
					}).catch(function() {
						// this.$message({
						// 	type: 'info',
						// 	message: '已取消删除'
						// });          
					});
				}else if(type == 'cove'){
					var res = await axios.post(MOD_URL+'&op=collect&do=setcovert',{
						clid:self.Leftclid,
						lid:val
					});
					var json = res.data;
					if(json.success){
						self.$message({
							message: '{lang set_cover_success}',
							type: 'success'
						});
					}else{
						self.$message({
							message: json.error,
							type: 'error'
						});
					}
				}
			},
			Imagereturnparam(data){//列表加载完成返回得参数
				this.ImageDataParam = data;
				var arr = [];
				for(var i in this.ImageDataParam.data){
					arr.push(this.ImageDataParam.data[i].dpath)
				}
				if(this.ImageDataIframe){
					var params = this.CommonSetParam();
					params['ispage'] = this.ImageDataParam.ismore;
					params['page'] = this.ImageDataParam.page;
					params['total'] = this.ImageDataParam.total;
					params['totalpage'] = this.ImageDataParam.totalpage;
					params['perpage'] = this.ImageDataParam.perpage;
					params['pagetab'] = 'pichome';
					params['moreurl'] = MOD_URL+'&op=library&do=filelist&operation=filelist';
					this.ImageDataIframe.sessionStorage.setItem('imgparam',JSON.stringify(params));
					
					this.ImageDataIframe.sessionStorage.setItem('imgs',arr.join(','));
				}else{
					sessionStorage.setItem('imgs',arr.join(','));
				}
				
			},
			ImagePageTurning(dpath){//详情翻页事件
				const self = this;
				self.$refs.RefImageLayout.SetScrollbarTop(dpath);
				self.HandleElScrollbar();
			},
			HandleElScrollbar(){
				var self = this;
				self.$refs.RefImageLayout.HandleElScrollbar();
			},
			ImageDetails(item){//双击事件
				const self = this;
				var arr = [];
				for(var i in this.ImageDataParam.data){
					arr.push(this.ImageDataParam.data[i].dpath)
				}
				let index = this.ImageDataParam.data.findIndex(function(current){
					return current.dpath == item.dpath;
				});
				
				if(this.OpenDetailType == 'new'){
					var params = this.CommonSetParam();
					params['ispage'] = this.ImageDataParam.ismore;
					params['page'] = this.ImageDataParam.page;
					params['total'] = this.ImageDataParam.total;
					params['totalpage'] = this.ImageDataParam.totalpage;
					params['perpage'] = this.ImageDataParam.perpage;
					params['pagetab'] = 'pichome';
					params['moreurl'] = MOD_URL+'&op=library&do=filelist&operation=filelist';
					this.ImageDataIframe = window.open('index.php?mod=details#path='+item.dpath,'details');
					this.ImageDataIframe.sessionStorage.setItem('imgparam',JSON.stringify(params));
					this.ImageDataIframe.sessionStorage.setItem('imgs',arr.join(','));
					this.ImageDataIframe.sessionStorage.setItem('selectindex',index);
					this.ImageDataIframe.sessionStorage.setItem('href',window.location.href);
				}else{
					sessionStorage.setItem('href',window.location.href);
					sessionStorage.setItem('selectindex',index);
					this.DetailsIframe = 'index.php?mod=details&opentype=current#path='+item.dpath;

				}
				window.removeEventListener('message', this.ImageDetailsMessage)
				window.addEventListener('message', this.ImageDetailsMessage)
			},
			ImageDetailsMessage(event){
		      	if (event.origin !== window.location.origin) {
		        	return;
		      	}
		      	this.ImagePageTurning(event.data.dpath);
			},
		},
		mounted(){
			var self = this;
		}
	};
</script>
