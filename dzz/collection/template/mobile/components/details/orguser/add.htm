<van-popup class="seasrch-popup footer-popup orguseradd-popup" v-model="OrguserAdd.PopupVisible" round position="bottom" :style="{ height: '90%' }" style="padding-bottom: 120px;" @open="OrguserAddPopupOpen" @close="OrguserAddPopupClose">
	<div class="vam-popup-title" @click="OrguserAdd.PopupVisible=false">{lang add_member}</div>
	<div class="van-search-box">
		<van-search class="popup-search-input" v-model.trim="OrguserAdd.keyword" shape="round" placeholder="{lang Enter_keywords}" @input="OrguserAddSearchInputKeyword" maxlength="50" :clearable="false">
			<template #right-icon>
				<van-icon v-show="OrguserAdd.keyword" @click="OrguserAddSearchClearKeyword" name="cross" />
			</template>
		</van-search>
	</div>
	<div class="search-val-box">
		<template v-if="OrguserAdd.loading">
			<van-loading class="custom-load" size="24px" type="spinner" color="var(--header-text)" vertical>{lang loading}</van-loading>
		</template>
		<template v-else>
			<van-checkbox-group v-model="OrguserAdd.value">
				<van-cell-group>
					<van-cell
						v-for="(item, index) in OrguserAdd.data"
						clickable
						:key="item.uid"
						@click="OrguserAddCelltoggle(index)">
						<template #title>
							<div>
								<div style="display: inline-block;" v-html="item.icon"></div>
								<span>{{item.username}}</span>
							</div>
						</template>
						<template #right-icon>
							<van-checkbox :name="item.uid" ref="OrguserAddcheckboxes" shape="square"></van-checkbox>
						</template>
					</van-cell>
				</van-cell-group>
			</van-checkbox-group>
		</template>
	</div>
	<div class="perm-box">
		<van-radio-group v-model="OrguserAdd.perm" direction="horizontal">
			<van-radio :name="1" v-cloak>{lang view_memeber}</van-radio>
			<van-radio :name="2" v-cloak>{lang edit_memeber}</van-radio>
			<van-radio :name="3" v-cloak>{lang manage_memeber}</van-radio>
		</van-radio-group>
	</div>
	<div class="btn-bottom">
		<van-row gutter="20">
		  <van-col span="24" style="text-align: center;">
			  <van-button round type="info" size="large" @click="OrguserAddSubmit" v-cloak>{lang confirms}</van-button>
		  </van-col>
		</van-row>
	
	</div>
</van-popup>
<script type="text/javascript">
	var OrguserAddMixin = {
		data(){
			return {
				OrguserAdd:{
					PopupVisible:false,
					keyword:'',
					data:[],
					loading:true,
					value:[],
					perm:1
				}
			}
		},
		methods:{
			OrguserAddCelltoggle(index){
				var self = this;
				self.$refs.OrguserAddcheckboxes[index].toggle();
			},
			OrguserAddPopupOpen(){
				this.OrguserAddGetData();
			},
			OrguserAddSearchInputKeyword(val){
				if(val){
					this.OrguserAddSearchInputKeyworddebounce();
				}else{
					this.OrguserAddGetData();
				}
			},
			OrguserAddSearchClearKeyword(){
				this.OrguserAdd.keyword = '';
				this.OrguserAddGetData();
			},
			OrguserAddSearchInputKeyworddebounce:debounce(function(){
				this.OrguserAddGetData();
			},800),
			async OrguserAddGetData(){
				var self = this;
				this.OrguserAdd.loading = true;
				self.OrguserAdd.data = [];
				
				var res = await axios.post(MOD_URL+'&op=collect&do=getuser',{
					keyword:self.OrguserAdd.keyword
				});
				if(res == 'intercept'){
					return false;
				}
				var data = res.data;
				if(data.success){
					var arr = [];
					for(var i in data.success){
						var item = data.success[i];
						if(self.Orguser.datauids.indexOf(parseInt(item.uid))<0){
							self.OrguserAdd.data.push(item);
						}
					}
				}else{
					self.$toast.fail('{lang get_data_fail}');
				}
				self.OrguserAdd.loading = false;
			},
			async OrguserAddSubmit(){
				var self = this;
				if(self.OrguserAdd.value.length){
					self.$toast.loading({
						message: '{lang In_the_save}',
						overlay:true,
						className:'conter-toast',
						duration: 0,
						forbidClick: true,
						loadingType: 'spinner',
					});
					var res = await axios.post(MOD_URL+'&op=collect&do=addusertocollect',{
						clid:self.ParamBasic.clid,
						objuid:self.OrguserAdd.value.join(','),
						perm:self.OrguserAdd.perm,
					});
					if(res == 'intercept'){
						return false;
					}
					var json = res.data;
					self.$toast.clear();
					if(json.success){
						var arr = [];
						for(var i in self.OrguserAdd.value){
							var uid = self.OrguserAdd.value[i];
							for(var u in self.OrguserAdd.data){
								var item = self.OrguserAdd.data[u];
								if(parseInt(item.uid) == uid){
									item['perm'] = self.OrguserAdd.perm;
									self.Orguser.data.push(item);
									self.Orguser.datauids.push(parseInt(item.uid));
								}
							}
						}
						
					}else{
						self.$toast.fail('{lang save_unsuccess}');
					}
					self.OrguserAdd.PopupVisible = false;
				}else{
					self.$notify({ type: 'danger', message: '{lang Please_select_add_user}' });
				}
			},
			OrguserAddPopupClose(){
				this.OrguserAdd.keyword = '';
				this.OrguserAdd.data = [];
				this.OrguserAdd.value = [];
			},
		}
	};
</script>
