<van-popup class="seasrch-popup footer-popup" v-model="Orguserearch.PopupVisible" round position="bottom" :style="{ height: '90%' }" @open="OrguserearchPopupOpen" @close="OrguserearchPopupClose">
	<div class="vam-popup-title" @click="Orguserearch.PopupVisible=false">{lang search}</div>
	<div class="van-search-box">
		<van-search class="popup-search-input" v-model.trim="Orguserearch.keyword" shape="round" placeholder="{lang Enter_keywords}" @input="OrguserearchInputKeyword" maxlength="50" :clearable="false">
			<template #right-icon>
				<van-icon v-show="Orguserearch.keyword" @click="OrguserearchClearKeyword" name="cross" />
			</template>
		</van-search>
	</div>
	<div class="search-val-box">
		<template v-if="Orguserearch.likedata.length">
			<van-list>
				<van-cell v-for="(item,index) in Orguserearch.likedata" :key="index" @click="OrguserearchClickLike(item.text)">
					<template #title>
						<div v-html="item.highlight"></div>
					</template>
				</van-cell>
			</van-list>
		</template>
	</div>
	<div class="btn-bottom">
		<van-row gutter="20">
		  <van-col span="12" style="text-align: center;">
			  <van-button round plain type="primary" size="large" @click="OrguserearchClearKeyword" v-cloak>{lang reset}</van-button>
		  </van-col>
		  <van-col span="12" style="text-align: center;">
			  <van-button round type="info" size="large" @click="Orguserearch.PopupVisible = false" v-cloak>{lang confirms}</van-button>
		  </van-col>
		</van-row>
	
	</div>
</van-popup>
<script type="text/javascript">
	var OrguserearchMixin = {
		data(){
			return {
				Orguserearch:{
					PopupVisible:false,
					keyword: '',
					likedata:[],
					issearch:false
				}
			}
		},
		methods:{
			OrguserearchPopupOpen(){
				var self = this;
				self.OrguserearchLikeword();
				self.Orguserearch.keywordDefault = self.Orguserearch.keyword;
			},
			OrguserearchPopupClose(){
				var self = this;
				if(self.Orguserearch.keywordDefault == self.Orguserearch.keyword){
					return false;
				}
				this.OrguserearchSubmit();
			},
			OrguserearchClearKeyword(){
				this.Orguserearch.keyword = '';
				this.OrguserearchLikeword();
			},
			OrguserearchInputKeyword(val){
				this.OrguserearchLikeword();
			},
			OrguserearchLikeword(){
				var self = this;
				var value = this.Orguserearch.keyword;
				var host = window.sessionStorage.getItem('HostKeyword');
				this.Orguserearch.likedata = [];
				if(value){
					if(host){
						host = host.split(',');
						for(var i in host){
							if(host[i].indexOf(value)>-1){
								var text = host[i];
								var highlight = self.SearchHighlight(text,self.Orguserearch.keyword);
								self.Orguserearch.likedata.push({
									text:text,
									highlight:highlight
								});
							}
						}
					}
				}else{
					if(host){
						host = host.split(',');
						for(var i in host){
							var text = host[i];
							self.Orguserearch.likedata.push({
								text:text,
								highlight:text
							});
						}
					}
				}
			},
			SearchHighlight(text,words){
				// 默认的标签，如果没有指定，使用span
				var i, len = words.length,
				re;
				//匹配每一个特殊字符 ，进行转义
				var specialStr = ["*", ".", "?", "+", "$", "^", "[", "]", "{", "}", "|", "\\", "(", ")", "/", "%"]; 
				$.each(specialStr, function(i, item) {
					if(words.indexOf(item) != -1) {
						words = words.replace(new RegExp("\\" + item, 'g'), "\\" + item);
					}
				});
				//匹配整个关键词
				re = new RegExp(words, 'g');
				if(re.test(text)) {
					text = text.replace(re, '<span class="highlight">$&</span>');
				}
				return text;
			},
			OrguserearchClickLike(val){
				var self = this;
				if(self.Orguserearch.keyword != val){
					self.Orguserearch.keyword = val;
					self.Orguserearch.PopupVisible = false;
				}
				
			},
			OrguserearchSubmit(){
				var self = this;
				var value = this.Orguserearch.keyword;
				self.Orguser.keyword = JSON.parse(JSON.stringify(value));
				self.OrguserPopupGetData();
				var host = window.sessionStorage.getItem('HostKeyword');
				if(value){
					if(host){
						host = host.split(',');
						var index = host.indexOf(value);
						
						if(index>-1){
							host.splice(index,1);
						}else{
							if(host.length>9){
								host.pop();
							}
						}
						host.unshift(value);
						var newhost = host.join(',');
						if(host){
							window.sessionStorage.setItem("HostKeyword",newhost);
						}else{
							window.sessionStorage.removeItem("HostKeyword");
						}
					}else{
						window.sessionStorage.setItem("HostKeyword",value);
					}
				}
				
				
				
			},
		}
	};
</script>
