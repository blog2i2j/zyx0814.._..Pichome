<div class="screen-item">
	<van-cell-group class="screen-cell-input">
		<van-field v-model.trim="ParamScreen.value.duration.start" placeholder="{lang min}" @input="ScreenDurationChange" />
	</van-cell-group>
	<van-cell-group class="screen-cell-input">
		<van-field v-model.trim="ParamScreen.value.duration.end" placeholder="{lang max}" @input="ScreenDurationChange" />
	</van-cell-group>
	<van-row class="swip-row">
		<van-col span="12">
			<div class="swip" :class="ParamScreen.value.duration.unit=='s'?'active':''" @click="ParamScreen.value.duration.unit='s'">{lang second</div>
		</van-col>
		<van-col span="12">
			<div class="swip" :class="ParamScreen.value.duration.unit=='m'?'active':''" @click="ParamScreen.value.duration.unit='m'">{lang point</div>
		</van-col>
	</van-row>
</div>
