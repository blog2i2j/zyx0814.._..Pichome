<!--{template common/container/pc/header_start}-->
<link rel="stylesheet" href="static/scss/default/index.css?{VERHASH}">
<link rel="stylesheet" type="text/css" href="{MOD_PATH}/css/mobile/index.css?{VERHASH}"/>
<style>
	.editdialog .el-overlay-dialog{
		padding: 16px;
	}
	.editdialog .el-overlay-dialog .el-dialog{
		width: 100%;
	}
	.editdialog .el-overlay-dialog .el-dialog .el-dialog__header{
		padding: 15px;
    	padding-bottom: 10px;
	}
	.editdialog .el-overlay-dialog .el-dialog .el-dialog__body{
		padding: 10px 15px;
	}
	.editdialog .el-overlay-dialog .el-dialog .el-dialog__footer{
		padding: 5px 15px 10px;
	}
</style>
<!--{template common/container/pc/header_end}-->
<div id="dzzoffice">
	<el-container class="page-main">
		<el-header class="page-header" height="40px" style="border: 0;background: transparent;padding: 0 10px">
			<a class="h-left" href="javascript:window.close();" style="color: var(--el-text-color-regular);">
				<el-icon><Arrow-Left /></el-icon>
			</a>
			<div class="h-center" style="justify-content: center;"> 
				<el-text size="large">{lang collect}</el-text>
			</div>
		</el-header>
		<el-header class="page-header"  height="auto" style="border: 0;background: transparent;--el-header-padding: 10px;width: 100%;">
			<div style="display: flex;width: 100%;">
				<el-input
					v-model="search"
					placeholder="{lang search}"
					prefix-icon="Search"
					@change="handlesearch" 
					type="search"
					clearable
				></el-input>
				<el-button icon="Plus" style="margin-left: 12px;" @click="FileGatherformdata.visible=true"></el-button>
			</div>
		</el-header>
		
		<el-main style="--el-main-padding: 10px;">
			<div class="favorites-list">
				<div class="van-row">
					<div class="van-col" v-if="!newsearch">
						<div class="own-single own-gather Sortable-item">
							<div class="item-single">
								<a class="img-box" href="{MOD_URL}&op=all">
									<div class="slice" style="z-index: 5;right: 50%;">
										<el-image v-if="FileGatherCover.cover0" class="img" :src="FileGatherCover.cover0" fit="cover">
											<template #error><div class="el-image__placeholder"></div></template>
										</el-image>
									</div>
									<div class="slice" style="z-index: 4;right: 37.5%;">
										<el-image v-if="FileGatherCover.cover1" class="img" :src="FileGatherCover.cover1" fit="cover">
											<template #error><div class="el-image__placeholder"></div></template>
										</el-image>
									</div>
									<div class="slice" style="z-index: 3;right: 25%;">
										<el-image v-if="FileGatherCover.cover2" class="img" :src="FileGatherCover.cover2" fit="cover">
											<template #error><div class="el-image__placeholder"></div></template>
										</el-image>
									</div>
									<div class="slice" style="z-index: 2;right: 12.5%;">
										<el-image v-if="FileGatherCover.cover3" class="img" :src="FileGatherCover.cover3" fit="cover">
											<template #error><div class="el-image__placeholder"></div></template>
										</el-image>
									</div>
									<div class="slice" style="z-index: 1;">
										<el-image v-if="FileGatherCover.cover4" class="img" :src="FileGatherCover.cover4" fit="cover">
											<template #error><div class="el-image__placeholder"></div></template>
										</el-image>
									</div>
								</a>
								<div class="information">
									<div class="title">{lang all_collect}</div>
									<div class="message" v-cloak>{{FileGatherCover.total}}{lang collect_picture}</div>
								</div>
							</div>
						</div>
					</div>
					<div class="van-col" v-for="item in FileGatherDataList">
						<div class="own-single Sortable-item">
							<div class="item-single">
								<a class="img-box img-checked" :href="'index.php?mod=collection&op=detail&clid='+item.clid">
									<div class="left">
										<el-image v-if="item.covert" class="img" :src="item.covert" fit="cover">
											<template #error><div class="el-image__placeholder"></div></template>
										</el-image>
									</div>
									<div class="right">
										<div class="right-block">
											<el-image v-if="item.covert1" class="img" :src="item.covert1" fit="cover">
												<template #error><div class="el-image__placeholder"></div></template>
											</el-image>
										</div>
										<div class="right-block">
											<el-image v-if="item.covert2" class="img" :src="item.covert2" fit="cover">
												<template #error><div class="el-image__placeholder"></div></template>
											</el-image>
										</div>
									</div>
								</a>
								<div class="information" v-cloak>
									<div class="title">{{ item.name }}</div>
									<div class="message">{{ item.filenum }}{lang collect_picture}</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</el-main>
	</el-container>
	<el-dialog
		align-center
		:title="FileGatherformdata.id?'{lang edit_collect}':'{lang add_collect}'"
		v-model="FileGatherformdata.visible"
		modal-class="editdialog"
		@close="FileGatherdialogClose">
		<el-form ref="FormFileGather" :model="FileGatherformdata" label-position="top">
			<el-form-item 
				label="{lang name}："
				prop="name"
				:rules="[
				{ required: true, message: '{lang Please_input_name}', trigger: 'blur' }
				]">
				<el-input v-model.trim="FileGatherformdata.name"></el-input>
			</el-form-item>
		</el-form>
		<template #footer>
			<span class="dialog-footer">
				<el-popconfirm v-if="FileGatherformdata.id" title="{lang delete_tip}" cancel-button-type="danger" @confirm="FileGatherDelete">
					<template #reference>
						<el-button style="float: left;" type="danger">{lang delete}</el-button>
					</template>
				</el-popconfirm>
				<el-button @click="FileGatherformdata.visible = false">{lang cancel}</el-button>
				<el-button type="primary" @click="FileGatherSubmit">{lang confirms}</el-button>
			</span>
		</template>
		
	</el-dialog>
</div>

<script type="text/javascript">
	const { createApp, reactive, toRefs, toRef, ref, onMounted, nextTick, watch } = Vue;
	const dzzoffice = createApp({
		data() {
			return {
				DocumentThemeColor:'',
				FileGatherDataList:[],
				FileGatherDataStoreList:[],
				FileGatherLoading:true,
				FileGatherCover:{
					cover0:'',
					cover1:'',
					cover2:'',
					cover3:'',
					cover4:'',
					total:0,
				},
				search:'',
				newsearch:'',
				FileGatherformdata:{
					visible:false,
					id:'',
					name:'',
					loading:false
				}
			}
		},
		watch:{
			DocumentThemeColor:{
				handler(newval){
					document.querySelector('html').className = newval
				},
				deep:true,
				// immediate:true
			}
			
			
		},
		created() {
			 //主题颜色
			let theme = localStorage.getItem('theme');
			if(theme){
				this.DocumentThemeColor=theme;
			}else{
				this.DocumentThemeColor = 'light'
			}
			var FileGatherDataList = $collects;
			for(var i in FileGatherDataList){
				this.FileGatherDataStoreList.push(FileGatherDataList[i]);
			}
			this.FileGatherDataList = JSON.parse(JSON.stringify(this.FileGatherDataStoreList));
			this.FileGatherGetCoverFive();
		},
		methods: {
			async FileGatherGetCoverFive(){
				let {data: res} = await axios.post(MOD_URL+'&do=getallcovert');
				this.FileGatherCover.cover0 = res.data[0];
				this.FileGatherCover.cover1 = res.data[1];
				this.FileGatherCover.cover2 = res.data[2];
				this.FileGatherCover.cover3 = res.data[3];
				this.FileGatherCover.cover4 = res.data[4];
				this.FileGatherCover.total = res.data.total;
			},
            mainclick(appid){
				window.location.href = MOD_URL+'&op=library&do=fileview#appid='+appid;
				return false;
			},
			async handlesearch(){
				this.newsearch = this.search;
				let {data: res} = await axios.post(MOD_URL+'&do=searchcollect',{keyword:this.search});
				this.FileGatherDataList = res.data?res.data:[];
			},
			DocumentThemeChange(){
				if(this.DocumentThemeColor=='light'){
					this.DocumentThemeColor='dark';
					localStorage.setItem('theme','dark');
				}else{
					this.DocumentThemeColor='light';
					localStorage.setItem('theme','light');
				}
			},
			FileGatherSubmit(){
				var self = this;
				
				self.$refs.FormFileGather.validate(async (valid, fields) => {
					if (valid) {
						if(self.FileGatherformdata.id){
							var param = {
								clid:self.FileGatherformdata.id,
								name:self.FileGatherformdata.name
							}
						}else{
							var param = {
								name:self.FileGatherformdata.name
							}
						}
						let {data: res} = await axios.post(MOD_URL+'&op=collect&do=addcollect',param);
						if(res.success){
							if(self.FileGatherformdata.id){
								let curr = self.FileGatherDataList.find(function(current){
									return parseInt(current.id) == parseInt(self.FileGatherformdata.id);
								});
								if(curr){
									curr.name = self.FileGatherformdata.name;
								}
								self.$message({
									message: '{lang edit_success}',
									type: 'success'
								});
							}else{
								var str = {
									filenum:0,
									name:res.success.name,
									covert:'',
									covert1:'',
									covert2:'',
									clid:res.success.clid,
								}
								self.FileGatherDataList.unshift(str);
							}
							
							self.FileGatherdialogVisible = false;
						}else{
							self.$message.error('{lang edit_error}');
						}
						self.FileGatherformdata.visible = false;
					} 
				})
			},
			FileGatherdialogClose(){
				var self = this;
				self.$refs.FormFileGather.resetFields();
			},
		},
		mounted() {}
	});
	dzzoffice.use(ElementPlus, {
		locale: {$_G['language_list'][$_G['language']]['elementflagCamel']},
	});
	for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
		dzzoffice.component(key, component)
	}
	// 屏蔽警告信息
	dzzoffice.config.warnHandler = function(){return null};
	dzzoffice.mount('#dzzoffice');
</script>

<!--{template common/container/pc/footer}-->
