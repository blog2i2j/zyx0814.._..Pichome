<!--{template common/container/pc/header_start}-->

<link rel="stylesheet" href="{MOD_PATH}/vditor/dist/index.css?{VERHASH}">

<script src="{MOD_PATH}/vditor/dist/index.js?{VERHASH}"></script>
<style>

    .vditor-wysiwyg pre.vditor-reset[contenteditable="false"], .vditor-ir pre.vditor-reset[contenteditable="false"] {
        opacity: 1;
        cursor: inherit;
    }

    .vditor {
        border: 0;
    }

    .vditor-sv.vditor-reset {
        display: none ;
    }

    .vditor-preview {
        display: block;
        border-left: 0;
        background-color: var(--panel-background-color);
    }

    .vditor-preview .vditor-preview__action {
        display: none;
        background-color: var(--panel-background-color);
    }

    .vditor-preview .vditor-reset {
        background-color: var(--panel-background-color);
    }

    .vditor-outline {
        padding:10px 10px 0 0;
        display: block !important;
        max-width: 350px;
        width:auto;
    }

    .vditor-outline .vditor-outline__title {
        display: none;
    }

    .vditor-toolbar--hide {
        display: block;
    }

    .vditor-outline li > span > span {
        white-space: normal;
    }
</style>
<!--{template common/container/pc/header_end}-->
<div id="dzzoffice">
    <link rel="stylesheet" :href="'{MOD_PATH}/vditor/dist/css/content-theme/'+DocumentThemeColor+'.css?{VERHASH}'">
    <div class="editor-wrapper" style="height: 100%">
        <div id="vditor"></div>
    </div>
</div>
<pre id="content" style="display: none">$content</pre>
<script type="text/javascript">
    const {createApp, reactive, toRefs, toRef, ref, onMounted, nextTick, watch} = Vue;
    const dzzoffice = createApp({
        data() {
            return {
                DocumentThemeColor: '',
                content: '',
                language: "$_G['language']",
                scrollElement: document.querySelector('.el-main'),
                contentEditor: '',
            }
        },
        mixins: [],
        watch: {
            DocumentThemeColor: {
                handler(newval) {
                    document.querySelector('html').className = newval
                },
                deep: true,
                // immediate:true
            }

        },
        created() {
            //主题颜色
            let theme = localStorage.getItem('theme');
            if (theme) {
                this.DocumentThemeColor = theme;
            } else {
                this.DocumentThemeColor = 'light'
            }

        },
        methods: {
            DocumentThemeChange() {
                if (this.DocumentThemeColor == 'light') {
                    this.DocumentThemeColor = 'dark';
                    localStorage.setItem('theme', 'dark');
                } else {
                    this.DocumentThemeColor = 'light';
                    localStorage.setItem('theme', 'light');
                }
                let self = this;

            },
        },
        async mounted() {
            let self = this;
            this.content = document.getElementById('content').innerHTML;
            this.contentEditor = new Vditor('vditor', {

                height: '100%',
                cdn: 'dzz/markdown/vditor',
                toolbarConfig: {
                    hide: true
                },
                classes: ['vditor-catalog'],
                outline: {
                    enable: true,
                    position: 'left',
                },
                cache: {
                    enable: false,
                },
                theme: self.DocumentThemeColor,
                customWysiwygToolbar: function (toolbar, vditor) {
                },
                after: () => {
                    this.contentEditor.setValue(self.content);
                    //this.contentEditor.disabled();
                },
            })
            dzzoffice.WindowThis = this;
        },
        components: {},
    });
    dzzoffice.use(ElementPlus, {
        locale: {$_G['language_list'][$_G['language']]['elementflagCamel']},
    });
    dzzoffice.mount('#dzzoffice');
</script>
<!--{template common/container/pc/footer}-->
